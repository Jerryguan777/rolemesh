openapi: 3.1.0
info:
  title: RoleMesh API
  version: 1.1.0
  description: |
    REST contract for the `/api/v1/*` surface (webui-backend v1.1
    design). This YAML is the hand-maintained source of truth; the
    typed client `web/src/api/generated/types.ts` is generated from it
    (`npm run openapi:gen`) and CI guards both directions against drift
    (`test_openapi_codegen_freshness`, `test_openapi_contract`).

    The companion WebSocket endpoint `/api/v1/conversations/{id}/stream`
    is documented in design §4 (event-driven JSON protocol); OpenAPI 3
    does not model WS, so it is intentionally omitted here.

    Error responses use the shape declared in design §13:
    `{code, message, details?}`.

    List endpoints follow one pagination convention (enforced by
    `tests/webui/test_v1_list_pagination_shape.py`): a growable collection
    returns a named `*Page` envelope — `{items, total, limit, offset}` for
    offset/limit, or `{items, has_more, next_cursor}` for append-only
    cursor paging (conversation messages). A collection that is
    intrinsically bounded (a fixed enum, a static registry, or a small
    per-parent set) may return a bare array; the test holds the reviewed
    allowlist of those.

servers:
  - url: /
    description: Same-origin (FastAPI serves both the SPA and the API).

tags:
  - name: Auth
  - name: Backends
  - name: Coworkers
  - name: Conversations
  - name: Credentials
  - name: MCPServers
  - name: Models
  - name: Runs
  - name: Skills
  - name: Approvals
  - name: Users
  - name: Tenant
  - name: Safety
  - name: Tasks
  - name: Platform

paths:
  # ===================================================================
  # AUTH NAMESPACE POLICY (read before adding endpoints under /auth/*)
  # ===================================================================
  # Endpoints living here on /api/v1/auth/* MUST be auth-mode-agnostic
  # — the SPA can call them regardless of how the user logged in
  # (OIDC / builtin / bootstrap).
  #
  # Mode-specific protocol mechanics (OIDC redirect-callback dance,
  # builtin username/password POST) live in their OWN top-level
  # namespaces:
  #   /oidc/login, /oidc/callback, /oidc/refresh  ← OIDC protocol
  #   /builtin/login, /builtin/refresh            ← builtin (future)
  #
  # Reason: forcing them under /api/v1/auth/* would either (a) create
  # an oneOf body schema where OIDC's empty body + 302 sits next to
  # builtin's {username,password} → JSON token, which is ugly and the
  # frontend still has to branch on mode to use it, OR (b) require
  # changing the OIDC callback URL away from /oidc/callback, which
  # breaks every IdP integration that already has it registered.
  #
  # EXCEPTION — logout: a future POST /api/v1/auth/logout SHOULD be
  # unified. The frontend doesn't care how the session was created,
  # only that it gets killed; the backend dispatches internally to
  # the right protocol's revoke flow. This is the only `/auth/*`
  # endpoint where unification beats per-protocol separation.
  #
  # See contracts/README.md "Policy decisions" for the full rationale.
  # ===================================================================
  /api/v1/auth/config:
    get:
      tags: [Auth]
      operationId: getAuthConfig
      summary: Public auth-provider hints
      description: |
        Returns provider metadata the SPA needs at boot
        (login URL, mode). No credentials required.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthConfig' }

  /api/v1/auth/ws-ticket:
    post:
      tags: [Auth]
      operationId: createWsTicket
      summary: Issue a short-lived ticket for the WS handshake
      description: |
        The browser exchanges its long-lived session token for a
        short-exp JWT (<= 60s) which it then passes as the `ticket`
        query parameter on the WebSocket handshake. The ticket is
        bound to one `conversation_id`; the handshake compares it
        against the path so it cannot be reused across conversations
        (design §4 / 01a Open Question 1).

        Ownership is enforced at mint time: the conversation must
        belong to the caller (or the caller holds `coworker.manage`).
        A conversation that exists but is another member's returns the
        same 404 as a non-existent one.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WsTicketRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WsTicket' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Identity of the calling user
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/me/channel-links/telegram:
    post:
      tags: [Auth]
      operationId: issueTelegramLinkToken
      summary: Mint a Telegram link token for the caller
      description: |
        Returns a single-use link token (and a `t.me/<bot>?start=<token>`
        deep-link when the tenant's Telegram bot @username is on file).
        The token is consumed by the Telegram gateway on the next
        `/start <token>` from the user's account; on success the
        binding shows up in `GET`.

        409 RESOURCE_NOT_AVAILABLE if the tenant has no Telegram bot
        configured — the SPA renders a "configure a Telegram bot first"
        hint instead of producing a dangling token.
      security: [ { bearerAuth: [] } ]
      responses:
        '201':
          description: Token issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChannelLinkToken' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Tenant has no Telegram bot configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    get:
      tags: [Auth]
      operationId: listTelegramLinks
      summary: List Telegram identities linked by the caller
      description: |
        Polled by the SPA after a `POST` to detect when the user has
        completed the `/start <token>` round-trip. Returns an array so
        a single user may eventually bind multiple Telegram accounts.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChannelLinkIdentity' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/me/channel-links/{identity_id}:
    delete:
      tags: [Auth]
      operationId: unlinkChannelIdentity
      summary: Remove one Telegram link
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: identity_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Unlinked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/backends:
    get:
      tags: [Backends]
      operationId: getBackends
      summary: Static backend × provider × family compatibility matrix
      description: |
        Public metadata: no auth required (design §2.3 / §3 Phase 1).
        Frontends use this to render the per-coworker configuration
        form. Cache-Control is set to `max-age=3600`.
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
              description: Always `max-age=3600`.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Backend' }

  /api/v1/coworkers:
    get:
      tags: [Coworkers]
      operationId: listCoworkers
      summary: List coworkers visible to the caller
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CoworkerPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Coworkers]
      operationId: createCoworker
      summary: Create a coworker
      description: |
        Validates `(agent_backend × model.provider × model.family)`
        against the static matrix; rejects with `BACKEND_INCOMPAT`
        if the triple is unsupported and `MISSING_CREDENTIAL` when
        the tenant has no credential for the model's provider.
        Design §3 + §13.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CoworkerCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coworker' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/coworkers/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Coworkers]
      operationId: getCoworker
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coworker' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Coworkers]
      operationId: updateCoworker
      summary: Partially update a coworker
      description: |
        A PATCH that changes `model_id` re-runs the
        backend / provider / family validation; the same
        `BACKEND_INCOMPAT` and `MISSING_CREDENTIAL` codes apply.
        Changing `model_id` also publishes `web.coworker.restart`
        on NATS so the orchestrator hot-reloads the coworker config
        (design §7).
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CoworkerUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coworker' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Coworkers]
      operationId: deleteCoworker
      summary: Delete a coworker (cascades conversations / runs / messages)
      description: |
        Cascading delete — conversations, runs and messages owned by
        this coworker are removed. Design §3 "DELETE semantics" table.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/coworkers/{id}/share:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    post:
      tags: [Coworkers]
      operationId: shareCoworker
      summary: Make a coworker shared (tenant-wide)
      description: |
        Self-serve visibility flip to `shared` (feat/roles). A member
        may share a coworker they created; owner/admin/platform_admin
        may share any. Idempotent. Returns the updated coworker.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coworker' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/coworkers/{id}/unshare:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    post:
      tags: [Coworkers]
      operationId: unshareCoworker
      summary: Make a coworker private again (creator + managers only)
      description: |
        Visibility flip back to `private` (feat/roles). Same own-or-manage
        gate as share. Returns the updated coworker.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coworker' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/coworkers/{id}/conversations:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Conversations]
      operationId: listCoworkerConversations
      summary: List the caller's own conversations with a coworker
      description: |
        Chat privacy is per-user: the page contains only conversations
        the caller owns (`user_id` = caller), oldest first. Two members
        chatting with the same coworker never see each other's history;
        this applies to admins' lists too. Delegation child
        conversations are excluded.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Conversations]
      operationId: createCoworkerConversation
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConversationCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/conversations:
    get:
      tags: [Conversations]
      operationId: listUserConversations
      summary: List the caller's conversations across all coworkers (newest first)
      description: |
        The unified per-user chat history — every top-level conversation
        the caller owns, across all coworkers, merged and ordered
        newest-first. Each row carries its `coworker_id` so the client
        can badge it and route sends. Ownership is the filter
        (`conversations.user_id` = caller); delegation child
        conversations and ownerless rows are excluded, and no
        coworker-visibility check applies. The per-coworker list
        endpoint remains for the scoped, oldest-first view.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/conversations/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Conversations]
      operationId: getConversation
      description: |
        Ownership-scoped: 404 unless the conversation belongs to the
        caller or the caller holds `coworker.manage`. Another member's
        conversation is indistinguishable from a non-existent one. The
        same rule guards the messages / approval-requests sub-resources,
        DELETE, and WS-ticket minting.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Conversations]
      operationId: deleteConversation
      summary: Delete a conversation (cascades messages and runs)
      description: |
        Cascading delete — design §3 "DELETE semantics" treats
        conversations as owned children of coworkers.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/conversations/{id}/messages:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Conversations]
      operationId: listConversationMessages
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: before
          in: query
          required: false
          description: >-
            Opaque cursor from a previous page's next_cursor; returns the
            page of messages immediately older than it.
          schema: { type: string }
        - { $ref: '#/components/parameters/LimitParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessagePage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/conversations/{id}/approval-requests:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Conversations]
      operationId: listConversationApprovalRequests
      summary: List a conversation's approval requests (all states, for chat history)
      description: |
        The conversation's full HITL approval record — pending AND resolved
        (approved / rejected / expired / cancelled) — oldest first, so the SPA
        re-renders approval cards inline in the message stream on reload, not
        just the pending ones. Tenant-scoped via the conversation row: a
        conversation outside the caller's tenant returns 404.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApprovalRequest' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/models:
    get:
      tags: [Models]
      operationId: listModels
      summary: List platform models
      description: |
        Public, tenant-agnostic catalog. Optional `provider` /
        `family` query filters narrow the picker for the coworker
        wizard. `is_active=false` rows are filtered out by default
        — admin surfaces are out of scope for v1.1 (design §14).
      security: [ { bearerAuth: [] } ]
      parameters:
        - in: query
          name: provider
          required: false
          schema: { $ref: '#/components/schemas/ModelProvider' }
        - in: query
          name: family
          required: false
          schema: { $ref: '#/components/schemas/ModelFamily' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Model' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/models/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Models]
      operationId: getModel
      summary: Fetch one platform model
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/credentials:
    get:
      tags: [Credentials]
      operationId: listTenantCredentials
      summary: List the tenant's configured credentials (no secrets)
      description: |
        Returns only metadata (`provider`, timestamps). The encrypted
        payload never appears on this surface — design §8.1 envelope
        encryption. Use `PUT` to set a new value.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CredentialResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/credentials/{provider}:
    parameters:
      - in: path
        name: provider
        required: true
        schema: { $ref: '#/components/schemas/ModelProvider' }
    put:
      tags: [Credentials]
      operationId: putTenantCredential
      summary: Create or overwrite the credential for one provider
      description: |
        Body carries the real API key in `api_key`. The webui process
        encrypts via `CredentialVault.encrypt_json` before INSERT /
        UPDATE on `tenant_model_credentials`. A successful write
        publishes one `web.coworker.restart` event on JetStream per
        affected coworker so the orchestrator hot-reloads the cached
        config (design §7 hot-load matrix).
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CredentialUpsert' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CredentialResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Credentials]
      operationId: deleteTenantCredential
      summary: Remove a credential
      description: |
        Returns `409 RESOURCE_IN_USE` (with `details.coworker_ids`)
        if at least one coworker still references this provider. The
        SPA renders the count from `details` so the operator can fix
        the offenders before retrying.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Credential is still referenced by at least one coworker.
            `code="RESOURCE_IN_USE"`, `details.coworker_ids` lists
            the offenders.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/credentials/{provider}/pool:
    parameters:
      - in: path
        name: provider
        required: true
        schema: { $ref: '#/components/schemas/ModelProvider' }
    put:
      tags: [Credentials]
      operationId: electCredentialPool
      summary: Elect the platform credential pool for one provider
      description: |
        Sets the row's `mode` to `pool` so the resolver uses the
        platform key instead of the tenant's own. Any existing BYOK
        ciphertext is retained dormant so the tenant can flip back via
        `PUT /{provider}` without re-entering it. This is the explicit
        opt-in — until a tenant elects pool (or sets a BYOK key) the
        provider stays unconfigured and agents on it fail closed; the
        platform pool is never consumed silently. Restarts affected
        coworkers like the BYOK path.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CredentialResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/platform/credentials:
    get:
      tags: [Platform]
      operationId: listPlatformCredentials
      summary: List the platform credential pool (no secrets)
      description: |
        Platform-plane only (`credential.pool.manage`, granted to
        `platform_admin`). Returns metadata only — the encrypted pool
        key never appears on this surface.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PlatformCredentialResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/platform/credentials/{provider}:
    parameters:
      - in: path
        name: provider
        required: true
        schema: { $ref: '#/components/schemas/ModelProvider' }
    put:
      tags: [Platform]
      operationId: putPlatformCredential
      summary: Create or overwrite the platform pool key for one provider
      description: |
        Platform-plane only (`credential.pool.manage`). Body carries the
        real API key in `api_key`; the webui process encrypts via the
        same `CredentialVault` tenants use before INSERT / UPDATE on
        `platform_provider_credentials`. Tenants electing `pool` for this
        provider pick up the new key within the resolver's cache TTL — no
        per-coworker restart fan-out.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CredentialUpsert' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformCredentialResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Platform]
      operationId: deletePlatformCredential
      summary: Remove the platform pool key for one provider
      description: |
        Platform-plane only (`credential.pool.manage`). Tenant rows that
        elected `pool` for this provider are left intact; their next
        resolve fails closed until a key is re-added. Returns `404` if no
        pool key existed.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/tenants:
    get:
      tags: [Platform]
      operationId: listPlatformTenants
      summary: List all tenants (platform lifecycle)
      description: |
        Platform-plane only (`platform.tenant.manage`, granted to
        `platform_admin`). Returns every tenant, including suspended ones
        and the reserved `__platform__` sentinel, with lifecycle `status`.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PlatformTenantResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Platform]
      operationId: provisionPlatformTenant
      summary: Provision a new tenant
      description: |
        Platform-plane only (`platform.tenant.manage`). Creates a tenant in
        the `active` state. The reserved `__platform__` slug is rejected
        (`403`); a slug already in use returns `409`.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlatformTenantProvision' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformTenantResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/platform/tenants/{tenant_id}:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string }
    get:
      tags: [Platform]
      operationId: getPlatformTenant
      summary: Fetch one tenant (platform lifecycle)
      description: Platform-plane only (`platform.tenant.manage`).
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformTenantResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/tenants/{tenant_id}/suspend:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string }
    post:
      tags: [Platform]
      operationId: suspendPlatformTenant
      summary: Suspend a tenant
      description: |
        Platform-plane only (`platform.tenant.manage`). Sets `status` to
        `suspended`: the tenant's users can no longer authenticate and its
        scheduled tasks pause (they are not failed/deleted). Idempotent. The
        reserved `__platform__` sentinel cannot be suspended (`403`).
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformTenantResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/tenants/{tenant_id}/resume:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string }
    post:
      tags: [Platform]
      operationId: resumePlatformTenant
      summary: Resume a suspended tenant
      description: |
        Platform-plane only (`platform.tenant.manage`). Sets `status` back to
        `active` (suspend is reversible). Idempotent. The reserved
        `__platform__` sentinel is refused (`403`).
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformTenantResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/safety/rules:
    get:
      tags: [Platform]
      operationId: listPlatformSafetyRules
      summary: List all platform safety rules (every tier, incl. floor)
      description: |
        Platform-plane only (`safety.platform.manage`, granted to
        `platform_admin`). Unlike the tenant-facing `/api/v1/safety/rules`
        read — which surfaces only the visible tiers — this returns ALL
        tiers including `floor`, plus the `is_seeded` flag.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PlatformSafetyRule' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Platform]
      operationId: createPlatformSafetyRule
      summary: Create a platform safety rule
      description: |
        Platform-plane only (`safety.platform.manage`). The body is
        validated against the safety check registry — an unknown
        `check_id`, an unsupported `stage`, or an invalid `action_override`
        returns `400 INVALID_RULE`. A duplicate `(tier, check_id, stage)`
        identity returns `409`. Created rules carry `is_seeded=false` and
        allow full CRUD.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlatformSafetyRuleCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformSafetyRule' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/platform/safety/rules/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Platform]
      operationId: getPlatformSafetyRule
      summary: Get one platform safety rule (any tier)
      description: Platform-plane only (`safety.platform.manage`).
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformSafetyRule' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Platform]
      operationId: updatePlatformSafetyRule
      summary: Update a platform safety rule
      description: |
        Platform-plane only (`safety.platform.manage`). Patches the mutable
        fields — `config` / `priority` / `description` / `enabled`. The
        identity (`tier` / `stage` / `check_id`) is immutable. A changed
        `config` is re-validated (`400 INVALID_RULE`) when the check is in
        the orchestrator registry. Seeded defaults are editable here.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlatformSafetyRuleUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformSafetyRule' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Platform]
      operationId: deletePlatformSafetyRule
      summary: Delete a platform safety rule
      description: |
        Platform-plane only (`safety.platform.manage`). A seeded factory
        default (`is_seeded=true`) cannot be hard-deleted (`409`
        `SEEDED_RULE_IMMUTABLE`) — the next build-time seed would recreate
        it; disable it instead. Unknown id → 404.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/platform/safety/rules/{id}/enable:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    post:
      tags: [Platform]
      operationId: enablePlatformSafetyRule
      summary: Enable a platform safety rule
      description: Platform-plane only (`safety.platform.manage`).
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformSafetyRule' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/safety/rules/{id}/disable:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    post:
      tags: [Platform]
      operationId: disablePlatformSafetyRule
      summary: Disable a platform safety rule
      description: |
        Platform-plane only (`safety.platform.manage`). Also the sanctioned
        way to suppress a seeded factory default (which cannot be deleted).
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformSafetyRule' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/coworkers/{id}/mcp-servers:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Coworkers]
      operationId: listCoworkerMCPBindings
      summary: List a coworker's MCP server bindings
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CoworkerMCPBindingResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Coworkers]
      operationId: bindCoworkerMCPServer
      summary: Bind one MCP server to this coworker
      description: |
        `enabled_tools` is tri-state — `null` (or omitted) means all
        tools enabled, `[]` means all disabled, a non-empty list is a
        whitelist. Publishes `web.coworker.mcp_changed` on success.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CoworkerMCPBindingCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CoworkerMCPBindingResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/coworkers/{id}/mcp-servers/{mcp_id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
      - in: path
        name: mcp_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Coworkers]
      operationId: updateCoworkerMCPBinding
      summary: Update enabled_tools on a binding
      description: |
        The only mutable field is `enabled_tools`. `null` means all
        enabled, `[]` means all disabled, a non-empty list is a
        whitelist. Publishes `web.coworker.mcp_changed` on success.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CoworkerMCPBindingUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CoworkerMCPBindingResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Coworkers]
      operationId: unbindCoworkerMCPServer
      summary: Unbind an MCP server from this coworker
      description: |
        Idempotent: a 404 is returned when the binding does not exist.
        Publishes `web.coworker.mcp_changed` on success.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/skills:
    get:
      tags: [Skills]
      operationId: listSkills
      summary: List the tenant's catalog skills
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillSummaryPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Skills]
      operationId: createSkill
      summary: Create a per-tenant catalog skill
      description: |
        The `files` map must include `SKILL.md` (frontmatter + body of
        the skill manifest). Path traversal in any key is rejected
        with 422. Skill names must match `^[a-z0-9][a-z0-9-]{0,63}$`
        (lowercase, no leading hyphen) and must not be the reserved
        values `anthropic` or `claude`. Returns
        409 `RESOURCE_IN_USE` when a skill with this name already
        exists in the tenant.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Skill' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/skills/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Skills]
      operationId: getSkill
      summary: Fetch a skill with its file map
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Skill' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Skills]
      operationId: updateSkill
      summary: Update skill metadata (not files)
      description: |
        Use the per-file endpoints for content edits — this handler
        only touches the catalog row's enabled flag and frontmatter.
        Publishes one `web.coworker.skills_changed` event per
        coworker currently bound to this skill.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Skill' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Skills]
      operationId: deleteSkill
      summary: Delete a catalog skill
      description: |
        Returns 409 `RESOURCE_IN_USE` (with `details.coworker_ids`)
        when at least one coworker still binds this skill. Unbind
        first via `DELETE /api/v1/coworkers/{id}/skills/{skill_id}`.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Skill is still bound to at least one coworker.
            `code="RESOURCE_IN_USE"`, `details.coworker_ids` lists
            the offenders.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/skills/{id}/share:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    post:
      tags: [Skills]
      operationId: shareSkill
      summary: Make a skill shared (tenant-wide)
      description: |
        Self-serve visibility flip to `shared` (feat/roles). A member
        may share a skill they created; owner/admin/platform_admin may
        share any. Idempotent. Returns the updated skill.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Skill' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/skills/{id}/unshare:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    post:
      tags: [Skills]
      operationId: unshareSkill
      summary: Make a skill private again (creator + managers only)
      description: |
        Visibility flip back to `private` (feat/roles). Same
        own-or-manage gate as share. Returns the updated skill.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Skill' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/skills/{id}/files:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Skills]
      operationId: listSkillFiles
      summary: List the file paths in a skill
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/skills/{id}/files/{path}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
      - in: path
        name: path
        required: true
        description: |
          File path within the skill. Path traversal (e.g. `../`) is
          rejected with 422. `SKILL.md` is protected from DELETE
          (returns 409 `SKILL_MANIFEST_PROTECTED`).
        schema: { type: string }
    get:
      tags: [Skills]
      operationId: getSkillFile
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillFile' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Skills]
      operationId: putSkillFile
      summary: Upsert a single file in a skill
      description: |
        Creates the file if absent, overwrites it otherwise. Path
        validation (positive whitelist + traversal rejection) runs
        before any DB write. Publishes one `web.coworker.skills_changed`
        event per coworker currently bound to this skill.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillFileUpsert' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillFile' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Skills]
      operationId: deleteSkillFile
      summary: Delete a single file from a skill
      description: |
        `SKILL.md` is protected — DELETE returns 409
        `SKILL_MANIFEST_PROTECTED`. Publishes one
        `web.coworker.skills_changed` event per coworker currently
        bound to this skill.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            `SKILL.md` cannot be deleted (application-level
            invariant). `code="SKILL_MANIFEST_PROTECTED"`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/coworkers/{id}/skills:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Coworkers]
      operationId: listCoworkerSkills
      summary: List skill bindings for a coworker
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CoworkerSkillBinding' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/coworkers/{id}/skills/{skill_id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
      - in: path
        name: skill_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Coworkers]
      operationId: enableCoworkerSkill
      summary: Bind a catalog skill to this coworker
      description: |
        Idempotent: re-enabling an already-bound skill is a 200, not
        a 409. Publishes `web.coworker.skills_changed`.
      security: [ { bearerAuth: [] } ]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CoworkerSkillBinding' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Coworkers]
      operationId: disableCoworkerSkill
      summary: Unbind a skill from this coworker
      description: |
        Deletes the `coworker_skills` row; the catalog skill remains.
        Publishes `web.coworker.skills_changed`.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/mcp-servers:
    get:
      tags: [MCPServers]
      operationId: listMCPServers
      summary: List the tenant's MCP servers
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MCPServerPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [MCPServers]
      operationId: createMCPServer
      summary: Register a new MCP server
      description: |
        Publishes one `egress.mcp.changed` event (`action="created"`)
        on success so the gateway picks up the route without an
        orchestrator restart (design §7).
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MCPServerCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MCPServer' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/mcp-servers/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [MCPServers]
      operationId: getMCPServer
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MCPServer' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [MCPServers]
      operationId: updateMCPServer
      summary: Partially update an MCP server
      description: |
        Publishes one `egress.mcp.changed` event (`action="updated"`)
        on success.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MCPServerUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MCPServer' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [MCPServers]
      operationId: deleteMCPServer
      summary: Delete an MCP server
      description: |
        Returns `409 RESOURCE_IN_USE` (with `details.coworker_ids`)
        when at least one coworker still binds this MCP server.
        Publishes one `egress.mcp.changed` event (`action="deleted"`)
        on success.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            MCP server is still referenced by at least one coworker.
            `code="RESOURCE_IN_USE"`, `details.coworker_ids` lists
            the offenders.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ===================================================================
  # HITL tool approval (docs/12-hitl-approval-architecture.md §10 S5)
  # ===================================================================
  /api/v1/approvals/policies:
    get:
      tags: [Approvals]
      operationId: listApprovalPolicies
      summary: List the tenant's HITL approval policies
      description: |
        Ordered priority-desc, then newest `updated_at` (the matcher's
        tiebreak order). Tenant-scoped via RLS — never returns another
        tenant's policies.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalPolicyPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Approvals]
      operationId: createApprovalPolicy
      summary: Create an approval policy
      description: |
        `condition_expr` is the structured §7 language
        (`{always}` / `{field,op,value}` / `{and:[…]}` / `{or:[…]}`).
        A malformed expression is rejected with `400`
        (`code="VALIDATION_ERROR"`) so the operator fixes it up front,
        rather than shipping a policy that fail-closed approval-gates
        every matched call at runtime.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApprovalPolicyCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalPolicy' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/approvals/policies/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Approvals]
      operationId: getApprovalPolicy
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalPolicy' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Approvals]
      operationId: updateApprovalPolicy
      summary: Partially update an approval policy
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApprovalPolicyUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalPolicy' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Approvals]
      operationId: deleteApprovalPolicy
      summary: Delete an approval policy
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/approvals/requests:
    get:
      tags: [Approvals]
      operationId: listPendingApprovalRequests
      summary: List in-flight pending approval requests (web reconnect)
      description: |
        Authoritative source for re-rendering ✅/❌ approval cards after a
        socket drop — the live `event.approval.requested` push is
        fire-and-forget. Returns only `pending` rows for the caller's
        tenant (oldest first). The optional `conversation_id` filter is
        applied inside the tenant boundary, so a foreign id cannot
        surface another tenant's request.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
        - name: conversation_id
          in: query
          required: false
          schema: { type: string, format: uuid }
          description: Only return pending requests for this conversation.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalRequestPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/runs/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Runs]
      operationId: getRun
      summary: Fetch authoritative run state (used by WS reconnect)
      description: |
        Clients reconnecting to a stream first GET the run snapshot
        to decide whether the run is already terminal — design §4
        "reconnect" flow.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/runs/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    post:
      tags: [Runs]
      operationId: cancelRun
      summary: Request cancellation of an in-flight run (async)
      description: |
        Fire-and-forget: publishes `web.run.cancel.{run_id}` on
        JetStream and returns 202 immediately. The orchestrator stops
        the agent container and the lifecycle helper writes
        `status='cancelled'` once the container has actually halted —
        clients GET `/api/v1/runs/{id}` to observe the terminal state.

        409 with `code="ALREADY_TERMINAL"` is returned when the run
        is already in a terminal state at request time (no NATS
        publish happens in that case).
      security: [ { bearerAuth: [] } ]
      responses:
        '202':
          description: |
            Cancellation request accepted; orchestrator handles the
            actual container stop and DB UPDATE asynchronously.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Run is already in a terminal state (`code="ALREADY_TERMINAL"`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/safety/rules:
    get:
      tags: [Safety]
      operationId: listSafetyRules
      summary: List safety rules for the caller's tenant
      description: |
        Returns the tenant's own rules plus the visible platform-owned
        rules (read-only, `source=platform`). Reads gate on
        `safety.read`.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
        - name: coworker_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: stage
          in: query
          required: false
          schema: { $ref: '#/components/schemas/SafetyStage' }
        - name: enabled
          in: query
          required: false
          schema: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafetyRulePage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Safety]
      operationId: createSafetyRule
      summary: Create a tenant safety rule
      description: |
        Gated by `safety.rule.manage` (owner + admin). The body is
        validated against the check registry — an unknown `check_id`,
        an unsupported `stage`, a config the check's model rejects, or a
        `slow` check at `pre_tool_call` that overlaps a reversible tool
        returns `400 INVALID_RULE`. A non-null `coworker_id` outside the
        caller's tenant returns 404 (existence is not leaked).
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SafetyRuleCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafetyRule' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/safety/rules/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Safety]
      operationId: getSafetyRule
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafetyRule' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Safety]
      operationId: updateSafetyRule
      summary: Update a tenant safety rule
      description: |
        Gated by `safety.rule.manage`. Re-validates when `check_id` /
        `stage` / `config` change so the effective triple stays runnable
        (`400 INVALID_RULE` on failure). Only tenant-owned rule ids
        resolve; a cross-tenant / unknown / platform id returns 404.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SafetyRuleUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafetyRule' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Safety]
      operationId: deleteSafetyRule
      summary: Delete a tenant safety rule
      description: |
        Gated by `safety.rule.manage`. Cross-tenant / unknown id → 404.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/safety/rules/{id}/audit:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Safety]
      operationId: listSafetyRuleAudit
      summary: Change-history timeline for one safety rule
      description: |
        Newest-first projection of `safety_rules_audit` for one rule.
        Returns 404 if the rule does not exist in the caller's
        tenant — RLS on the audit table prevents cross-tenant
        existence leaks, and the explicit 404 keeps UUID guessing
        from yielding an empty 200 that signals "wrong tenant".
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafetyRuleAuditPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/safety/checks:
    get:
      tags: [Safety]
      operationId: listSafetyChecks
      summary: Registered safety checks (rule-editor metadata)
      description: |
        Stable-alphabetical ordering. The `config_schema` field is
        the check's declared Pydantic JSON schema, used by the SPA
        to render a config form without a second round-trip.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SafetyCheck' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/safety/decisions:
    get:
      tags: [Safety]
      operationId: listSafetyDecisions
      summary: Paginated safety decisions for the caller's tenant
      description: |
        Returns `{ total, items }` so the SPA renders pagination
        without a second count call. `limit` is capped at 200
        server-side; the `decisions.csv` export covers bulk retrieval.
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: verdict_action
          in: query
          required: false
          schema: { $ref: '#/components/schemas/SafetyVerdictAction' }
        - name: coworker_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: stage
          in: query
          required: false
          schema: { $ref: '#/components/schemas/SafetyStage' }
        - name: check_id
          in: query
          required: false
          description: |
            Narrow to decisions triggered by a rule using this check.
            A decision stores no check_id directly; the server resolves
            the check to its rule ids (tenant + platform catalogs) and
            matches by array overlap on triggered_rule_ids.
          schema: { type: string }
        - name: rule_id
          in: query
          required: false
          description: |
            Narrow to decisions whose triggered_rule_ids contains this
            rule id (array containment).
          schema: { type: string, format: uuid }
        - name: from_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafetyDecisionPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/safety/decisions/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Safety]
      operationId: getSafetyDecision
      summary: Single safety decision detail
      description: |
        Cross-tenant lookups return 404 (not 403) so UUID existence
        does not leak across tenants.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SafetyDecision' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/safety/decisions.csv:
    get:
      tags: [Safety]
      operationId: exportSafetyDecisionsCsv
      summary: Stream the tenant's safety decisions as CSV
      description: |
        Streaming CSV export (Postgres cursor, constant memory) for the
        caller's tenant — derived from the session, no tenant id in the
        path. Reads gate on `safety.read`. Columns are a flat,
        operator-friendly pivot view (`findings` flattened to parallel
        code/severity lists); the full JSON for any row is at
        `GET /api/v1/safety/decisions/{id}`. Cells are RFC-4180 quoted
        and formula-injection guarded.
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: from_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: verdict_action
          in: query
          required: false
          schema: { $ref: '#/components/schemas/SafetyVerdictAction' }
        - name: coworker_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: stage
          in: query
          required: false
          schema: { $ref: '#/components/schemas/SafetyStage' }
      responses:
        '200':
          description: CSV stream (attachment).
          content:
            text/csv:
              schema: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/tasks:
    get:
      tags: [Tasks]
      operationId: tasksList
      summary: List scheduled tasks for the tenant
      description: |
        Read-only listing of the `scheduled_tasks` table for the
        caller's tenant. The orchestrator owns task creation and
        mutation (cron-style triggers fired from inside the agent
        process); this endpoint exists so the UI can show "what's
        scheduled" without round-tripping through the orchestrator
        IPC. A coworker filter is exposed for the per-coworker view.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
        - name: coworker_id
          in: query
          required: false
          schema: { type: string, format: uuid }
          description: When set, only tasks bound to this coworker.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScheduledTaskPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/tasks/{id}:
    get:
      tags: [Tasks]
      operationId: tasksGet
      summary: Fetch one scheduled task
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScheduledTask' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tasks]
      operationId: tasksDelete
      summary: Delete a scheduled task
      description: |
        Removes a scheduled task. Gated by `task.manage` (owner +
        admin); reads on this surface stay auth-only. A cross-tenant /
        unknown id returns 404.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/coworkers/{id}/bindings:
    get:
      tags: [Coworkers]
      operationId: bindingsList
      summary: List channel bindings for a coworker
      description: |
        A binding represents the credentials + bot identity used to
        connect a coworker to one channel type (Slack workspace,
        Telegram bot, etc.). The corresponding gateway picks the
        binding up on next reload — see `src/rolemesh/channels/`.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChannelBinding' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Coworkers]
      operationId: bindingsCreate
      summary: Bind a coworker to a channel
      description: |
        Creates the binding row and reloads the matching gateway so
        the new connection comes up without a process restart.
        `(coworker_id, channel_type)` is unique — re-creating a
        binding for the same channel type returns 409.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChannelBindingCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChannelBinding' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/coworkers/{id}/bindings/{binding_id}:
    get:
      tags: [Coworkers]
      operationId: bindingsGet
      summary: Fetch one channel binding
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
        - name: binding_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChannelBinding' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Coworkers]
      operationId: bindingsUpdate
      summary: Update a channel binding's credentials or display name
      description: |
        Partial update. Fields not present in the body are left
        untouched. `credentials` replaces the whole map when
        provided (it's an opaque per-channel-type bag and merging
        keys client-side hides the wrong-key case from the user).
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
        - name: binding_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChannelBindingUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChannelBinding' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Coworkers]
      operationId: bindingsDelete
      summary: Remove a channel binding
      description: |
        Cascades through the channel gateway: the matching bot
        connection is torn down on next reload. Conversations
        anchored to this binding stay in the DB (they're history,
        not state) but stop receiving new messages.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
        - name: binding_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/models:
    post:
      tags: [Platform]
      operationId: platformModelsCreate
      summary: Register a new platform model (platform operator only)
      description: |
        The `models` catalog is platform-global — every tenant reads
        it at `/api/v1/models`, but only the platform operator writes
        it. POST/PATCH/DELETE require the platform-only `model.manage`
        capability (platform_admin).
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModelCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/platform/models/{id}:
    patch:
      tags: [Platform]
      operationId: platformModelsUpdate
      summary: Update a platform model (platform operator only)
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModelUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Platform]
      operationId: platformModelsDelete
      summary: Retire a platform model (platform operator only)
      description: |
        Soft delete — sets `active = false` rather than dropping the
        row so existing coworkers that point at the model keep
        rendering. Returns 409 if any coworker is still bound.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/IdInPath' }
      responses:
        '204':
          description: Deleted (soft)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List the tenant's users
      description: |
        Gated by `user.manage` (owner + admin). Returns every user in
        the caller's tenant.
      security: [ { bearerAuth: [] } ]
      parameters:
        - { $ref: '#/components/parameters/LimitParam' }
        - { $ref: '#/components/parameters/OffsetParam' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      operationId: createUser
      summary: Create a user in the tenant
      description: |
        Gated by `user.manage`. Creating a user with `role=owner`
        requires the caller to be an owner (admins get `403 FORBIDDEN`).
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/v1/users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [Users]
      operationId: getUser
      summary: Fetch one user
      description: |
        Gated by `user.manage`. A user outside the caller's tenant
        returns 404 (existence is not leaked).
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDetailResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      operationId: updateUser
      summary: Update a user
      description: |
        Gated by `user.manage`. Assigning `role=owner` requires the
        caller to be an owner (admins get `403 FORBIDDEN`). Cross-tenant
        / unknown id → 404.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: Delete a user
      description: |
        Gated by `user.manage`. Deleting yourself returns
        `400 INVALID_REQUEST`. Cross-tenant / unknown id → 404.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tenant:
    get:
      tags: [Tenant]
      operationId: getTenant
      summary: Fetch the caller's tenant settings
      description: |
        Owner-only (`tenant.manage`). Admins and members get
        `403 FORBIDDEN`.
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Tenant]
      operationId: updateTenant
      summary: Update the caller's tenant settings
      description: |
        Owner-only (`tenant.manage`). Only `name` and
        `max_concurrent_containers` are mutable here.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TenantUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdInPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (default 50, max 200).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    OffsetParam:
      name: offset
      in: query
      required: false
      description: Number of items to skip from the start of the ordered set.
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Caller is authenticated but not permitted.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: |
        Resource conflict — typically a duplicate name within the
        tenant, or attempted mutation of a terminal-state run.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unprocessable:
      description: |
        Semantic validation failure (e.g. `BACKEND_INCOMPAT`,
        `MISSING_CREDENTIAL` — design §13).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: |
            Stable, machine-readable error code (design §13). The catalog is
            kept in sync with the backend by a drift guard
            (`tests/webui/test_v1_error_codes.py`); the complete set is:

            Transport / CRUD: `NOT_FOUND`, `FORBIDDEN`, `CONFLICT`,
            `INVALID_REQUEST`, `RESOURCE_IN_USE`, `RESOURCE_NOT_AVAILABLE`,
            `ALREADY_TERMINAL`, `TENANT_SUSPENDED`.

            Coworker / model / credential: `MODEL_NOT_FOUND`,
            `MISSING_CREDENTIAL`, `BACKEND_INCOMPAT`.

            Skills: `INVALID_NAME`, `INVALID_PATH`, `INVALID_PAYLOAD`,
            `INVALID_MANIFEST`, `SKILL_MANIFEST_REQUIRED`,
            `SKILL_MANIFEST_PROTECTED`.

            Safety rules: `INVALID_RULE`, `SEEDED_RULE_IMMUTABLE`.

            Pagination / WS ticket: `INVALID_CURSOR`,
            `WS_TICKET_SECRET_UNSET`.

            (This is the HTTP error vocabulary; safety-check *finding*
            codes live on `SafetyFinding`, not here.)
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    AuthConfig:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [external, oidc, builtin, bootstrap]
        login_url:
          type: string
          nullable: true
          description: When set, the SPA redirects here for login.

    WsTicketRequest:
      type: object
      required: [conversation_id]
      properties:
        conversation_id:
          type: string
          format: uuid
          description: |
            UUID of the conversation the ticket authorises. The WS
            handshake compares this against the path `conversation_id`
            and refuses mismatched tickets without a DB hop.

    WsTicket:
      type: object
      required: [ticket, expires_in_s]
      properties:
        ticket:
          type: string
          description: Short-lived JWT (exp <= 60s).
        expires_in_s:
          type: integer
          minimum: 1
          maximum: 60

    Me:
      type: object
      required: [user_id, tenant_id, role, plane, capabilities]
      properties:
        user_id: { type: string }
        tenant_id: { type: string }
        name: { type: string }
        email: { type: string, nullable: true }
        role:
          type: string
          enum: [platform_admin, owner, admin, member]
        plane:
          type: string
          enum: [tenant, platform]
          description: |
            `platform` only for the platform-superset role
            (`platform_admin`); otherwise `tenant`.
        capabilities:
          type: array
          items: { type: string }
          description: |
            The caller's capability actions (e.g. `coworker.manage`),
            populated server-side from the role->action matrix. The SPA
            renders affordances from this list and keeps no copy of the
            matrix; the server still enforces every action via
            `require_action` / ownership checks.

    BackendName:
      type: string
      enum: [claude, pi]
      description: |
        Backend runtime identifier. Mirrors
        `rolemesh.core.backend_capabilities.ALL_BACKENDS`.

    ModelProvider:
      type: string
      enum: [anthropic, bedrock, openai, google]

    ModelFamily:
      type: string
      enum: [claude, gpt, gemini, llama]

    Backend:
      type: object
      required: [name, description, supported_providers, supported_model_families]
      properties:
        name:
          $ref: '#/components/schemas/BackendName'
        description:
          type: string
        supported_providers:
          type: array
          items: { $ref: '#/components/schemas/ModelProvider' }
        supported_model_families:
          type: array
          nullable: true
          description: |
            `null` means "any family the provider offers" (currently
            only Pi sets this).
          items: { $ref: '#/components/schemas/ModelFamily' }

    CoworkerStatus:
      type: string
      enum: [active, paused, disabled]

    Visibility:
      type: string
      enum: [private, shared]
      description: |
        Per-resource visibility (feat/roles). `private` — visible only
        to the creator and role-managers (owner/admin/platform_admin);
        `shared` — visible to and usable by every member of the tenant.
        New resources default to `private`; legacy rows were backfilled
        to `shared`.

    # The agent capability bits (rolemesh.auth.permissions.AgentPermissions).
    # Frontdesk v1.2 (migration D4) brought this onto the v1 surface: a
    # frontdesk needs agent_delegate=True to use delegate_to_agent, and the
    # is_frontdesk role gate validates it. All bits default false.
    CoworkerPermissions:
      type: object
      properties:
        agent_delegate: { type: boolean, default: false }
        task_schedule: { type: boolean, default: false }
        task_manage_others: { type: boolean, default: false }

    Coworker:
      type: object
      required:
        - id
        - tenant_id
        - name
        - folder
        - agent_backend
        - status
        - max_concurrent_containers
        - visibility
        - permissions
        - created_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        folder: { type: string }
        agent_backend: { $ref: '#/components/schemas/BackendName' }
        model_id:
          type: string
          format: uuid
          nullable: true
        system_prompt:
          type: string
          nullable: true
        status: { $ref: '#/components/schemas/CoworkerStatus' }
        max_concurrent_containers:
          type: integer
          minimum: 1
        created_by_user_id:
          type: string
          format: uuid
          nullable: true
        visibility: { $ref: '#/components/schemas/Visibility' }
        permissions: { $ref: '#/components/schemas/CoworkerPermissions' }
        is_frontdesk: { type: boolean, default: false }
        routing_description:
          type: string
          nullable: true
          maxLength: 500
        created_at: { type: string, format: date-time }

    CoworkerCreate:
      type: object
      required: [name, folder, agent_backend]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        folder:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[A-Za-z0-9][A-Za-z0-9_-]{0,63}$'
        agent_backend: { $ref: '#/components/schemas/BackendName' }
        model_id:
          type: string
          format: uuid
          nullable: true
        system_prompt:
          type: string
          nullable: true
        max_concurrent_containers:
          type: integer
          minimum: 1
          maximum: 20
          default: 2
        permissions: { $ref: '#/components/schemas/CoworkerPermissions' }
        is_frontdesk: { type: boolean, default: false }
        routing_description:
          type: string
          nullable: true
          maxLength: 500

    CoworkerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        system_prompt:
          type: string
          nullable: true
        model_id:
          type: string
          format: uuid
          nullable: true
        status: { $ref: '#/components/schemas/CoworkerStatus' }
        max_concurrent_containers:
          type: integer
          minimum: 1
          maximum: 20
        permissions:
          oneOf:
            - $ref: '#/components/schemas/CoworkerPermissions'
            - type: 'null'
        is_frontdesk: { type: boolean, nullable: true }
        routing_description:
          type: string
          nullable: true
          maxLength: 500

    ChannelType:
      type: string
      enum: [web, telegram, slack]

    Conversation:
      type: object
      required:
        - id
        - tenant_id
        - coworker_id
        - channel_binding_id
        - channel_chat_id
        - created_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        coworker_id: { type: string, format: uuid }
        channel_binding_id: { type: string, format: uuid }
        channel_chat_id: { type: string }
        name:
          type: string
          nullable: true
        created_at: { type: string, format: date-time }

    ConversationCreate:
      type: object
      description: |
        v1 web-chat creation: the server auto-creates the
        `web` channel binding (if missing) and a fresh
        `channel_chat_id` so the client does not have to know
        about channel internals.
      properties:
        name:
          type: string
          nullable: true
          description: Optional display label for the SPA conversation list.

    MessageRole:
      type: string
      enum: [user, assistant]
      description: |
        Wire-level role projection: `is_from_me=TRUE` or
        `is_bot_message=TRUE` rows surface as `assistant`; everything
        else as `user`. `system` / `safety` frames are delivered via
        the WS event stream (design §4) rather than the persisted
        message log.

    Message:
      type: object
      required: [id, role, content, timestamp]
      properties:
        id: { type: string }
        role: { $ref: '#/components/schemas/MessageRole' }
        content: { type: string }
        timestamp: { type: string, format: date-time }
        run_id:
          type: string
          format: uuid
          nullable: true

    RunStatus:
      type: string
      enum: [running, completed, failed, cancelled, awaiting_reauth]
      description: |
        Engine-wide closed set (design §4 / INV-6).
        `awaiting_reauth` is reserved for the user-mode MCP path
        (architecturally present, e2e gated on the OIDC branch) and
        is treated as terminal: the SPA prompts the user to re-auth
        and the next agent invocation starts a fresh run.

    RunUsage:
      type: object
      description: |
        Free-form per-turn usage attribution (token counts, cost,
        per-tool stats). Schema intentionally open — exact keys are
        determined by the backend; clients should treat it as
        opaque and key off `total_tokens` / `total_cost_usd` when
        present.
      additionalProperties: true

    RunError:
      type: object
      description: |
        Structured failure detail recorded by the lifecycle helper
        when a run terminates in `failed`, `cancelled`, or
        `awaiting_reauth`. Keys are intentionally open — engine
        callers populate `code` / `message` and may attach extra
        details (`reason` for `awaiting_reauth`, `exit_code` for
        container crashes).
      additionalProperties: true

    Model:
      type: object
      required: [id, provider, model_id, model_family, display_name, is_active]
      properties:
        id: { type: string, format: uuid }
        provider: { $ref: '#/components/schemas/ModelProvider' }
        model_id:
          type: string
          description: |
            Provider-side model identifier (e.g. `claude-opus-4-7`).
        model_family: { $ref: '#/components/schemas/ModelFamily' }
        display_name: { type: string }
        is_active: { type: boolean }
        created_at:
          type: string
          format: date-time
          nullable: true

    CredentialResponse:
      type: object
      required: [provider, mode, created_at, updated_at]
      properties:
        provider: { $ref: '#/components/schemas/ModelProvider' }
        mode:
          type: string
          enum: [byok, pool]
          description: |
            Which key the provider resolves to: `byok` (the tenant's own
            key) or `pool` (the platform credential pool). Metadata, not
            a secret.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PlatformCredentialResponse:
      type: object
      required: [provider, created_at, updated_at]
      properties:
        provider: { $ref: '#/components/schemas/ModelProvider' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TenantStatus:
      type: string
      enum: [active, suspended]
      description: |
        Platform tenant lifecycle state. `suspended` tenants cannot
        authenticate and their scheduled tasks pause until resumed.

    PlatformTenantResponse:
      type: object
      required: [id, name, max_concurrent_containers, status, created_at]
      description: |
        A tenant on the platform lifecycle plane (carries `status`).
        Distinct from `TenantResponse` (owner self-service settings).
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string, nullable: true }
        plan: { type: string, nullable: true }
        max_concurrent_containers: { type: integer }
        status: { $ref: '#/components/schemas/TenantStatus' }
        created_at: { type: string }

    PlatformTenantProvision:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        slug: { type: string, nullable: true, maxLength: 60 }

    CredentialUpsert:
      type: object
      required: [api_key]
      properties:
        api_key:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            Plaintext provider API key. Encrypted server-side via
            envelope encryption before being persisted; never returned
            on any subsequent GET (design §8.1).
        extras:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Provider-specific extras (e.g. `api_base`, `region`).
            Schema intentionally open — the credential proxy reads
            whatever shape the provider needs.

    CoworkerMCPBindingResponse:
      type: object
      required: [coworker_id, mcp_server_id]
      properties:
        coworker_id: { type: string, format: uuid }
        mcp_server_id: { type: string, format: uuid }
        enabled_tools:
          type: array
          nullable: true
          description: |
            Tri-state: `null` (or absent) means all tools enabled,
            `[]` means all disabled, a non-empty list is a whitelist.
          items: { type: string }

    CoworkerMCPBindingCreate:
      type: object
      required: [mcp_server_id]
      properties:
        mcp_server_id: { type: string, format: uuid }
        enabled_tools:
          type: array
          nullable: true
          items: { type: string }

    CoworkerMCPBindingUpdate:
      type: object
      properties:
        enabled_tools:
          type: array
          nullable: true
          items: { type: string }

    MCPType:
      type: string
      enum: [sse, http]

    MCPAuthMode:
      type: string
      enum: [user, service, both]
      description: |
        `user` — per-request user OIDC token (architecturally
        present, e2e gated on the OIDC branch).
        `service` — server-managed credential.
        `both` — endpoint accepts either, decided per call.

    MCPServer:
      type: object
      required:
        - id
        - tenant_id
        - name
        - type
        - url
        - auth_mode
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        type: { $ref: '#/components/schemas/MCPType' }
        url: { type: string }
        auth_mode: { $ref: '#/components/schemas/MCPAuthMode' }
        extra_headers:
          type: object
          additionalProperties: { type: string }
        tool_reversibility:
          type: object
          description: |
            Per-tool override map: {tool_name: bool}. `true` means
            the tool is reversible (the safety pipeline may auto-
            approve it). Empty object means "no override, fall back
            to the tenant default" — design §2.1.
          additionalProperties: { type: boolean }
        description:
          type: string
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MCPServerCreate:
      type: object
      required: [name, type, url, auth_mode]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 20
          pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
          description: >-
            Local label for the connection; embedded verbatim in every
            LLM-visible tool name as `mcp__{name}__{tool}` under a
            64-char tool-name contract, hence the short length and
            restricted charset.
        type: { $ref: '#/components/schemas/MCPType' }
        url:
          type: string
          minLength: 1
        auth_mode: { $ref: '#/components/schemas/MCPAuthMode' }
        extra_headers:
          type: object
          additionalProperties: { type: string }
          nullable: true
        tool_reversibility:
          type: object
          additionalProperties: { type: boolean }
          nullable: true
        description:
          type: string
          nullable: true

    MCPServerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 20
          pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
          description: >-
            Local label for the connection; embedded verbatim in every
            LLM-visible tool name as `mcp__{name}__{tool}` under a
            64-char tool-name contract, hence the short length and
            restricted charset.
        type: { $ref: '#/components/schemas/MCPType' }
        url:
          type: string
          minLength: 1
        auth_mode: { $ref: '#/components/schemas/MCPAuthMode' }
        extra_headers:
          type: object
          additionalProperties: { type: string }
          nullable: true
        tool_reversibility:
          type: object
          additionalProperties: { type: boolean }
          nullable: true
        description:
          type: string
          nullable: true

    # -----------------------------------------------------------------
    # HITL tool-approval policies (docs/12-hitl-approval-architecture.md §4/§7/§10 S5)
    # -----------------------------------------------------------------

    ConditionExpr:
      description: |
        Structured §7 approval condition. Exactly one form per node:
        `{"always": <bool>}`, `{"field","op","value"}`,
        `{"and": [<expr>,…]}`, or `{"or": [<expr>,…]}`. Ops:
        `== != > >= < <= in not_in contains`. No expression language /
        no eval. At match time evaluation is fail-closed (a malformed
        expr ⇒ require approval); at write time the API rejects a
        malformed expr with 400.
      type: object
      additionalProperties: true

    ApprovalPolicy:
      type: object
      required:
        - id
        - tenant_id
        - mcp_server_name
        - tool_name
        - condition_expr
        - enabled
        - priority
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        mcp_server_name: { type: string }
        tool_name:
          type: string
          description: Exact MCP tool name, or `*` for server-wide.
        condition_expr: { $ref: '#/components/schemas/ConditionExpr' }
        enabled: { type: boolean }
        priority:
          type: integer
          description: Higher wins on multiple matches; ties break to newest.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ApprovalPolicyCreate:
      type: object
      required: [mcp_server_name, tool_name]
      properties:
        mcp_server_name:
          type: string
          minLength: 1
          maxLength: 200
        tool_name:
          type: string
          minLength: 1
          maxLength: 200
        condition_expr:
          allOf:
            - $ref: '#/components/schemas/ConditionExpr'
          description: |
            Defaults to `{"always": true}` (every matched call needs
            approval) when omitted.
        enabled:
          type: boolean
          default: true
        priority:
          type: integer
          default: 0

    ApprovalPolicyUpdate:
      type: object
      properties:
        mcp_server_name:
          type: string
          minLength: 1
          maxLength: 200
        tool_name:
          type: string
          minLength: 1
          maxLength: 200
        condition_expr: { $ref: '#/components/schemas/ConditionExpr' }
        enabled: { type: boolean }
        priority: { type: integer }

    ApprovalTriggeredBy:
      type: object
      description: |
        Provenance of a safety-triggered approval (§1.1, §3.10). Present on an
        approval raised by a safety check's `require_approval` verdict; absent
        / null on a business-policy approval. `kind` is an open tag so future
        provenances (e.g. `scheduled_task`) extend without a break — V1 only
        emits `safety_rule`, and the SPA degrades to no banner on unknown
        kinds. No producer sets it yet (the safety→approval bridge is a
        separate unbuilt effort); the field exists so the contract + typed
        client are ready.
      required: [kind, rule_id, check_id, stage]
      properties:
        kind:
          type: string
          enum: [safety_rule]
        rule_id: { type: string, format: uuid }
        check_id: { type: string }
        stage: { $ref: '#/components/schemas/SafetyStage' }

    ApprovalRequest:
      type: object
      required:
        - request_id
        - mcp_server_name
        - tool_name
        - requested_at
        - expires_at
        - status
      properties:
        request_id:
          type: string
          format: uuid
          description: Echo back in a `request.approval_decision` WS frame.
        conversation_id:
          type: string
          format: uuid
          nullable: true
        mcp_server_name: { type: string }
        tool_name: { type: string }
        action_summary:
          type: string
          nullable: true
        requested_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        params:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Raw {tool_name→params} arguments snapshot — the decision input
            (§1.2). Tenant-scoped endpoint, so never crosses a tenant edge.
        coworker_id:
          type: string
          format: uuid
          nullable: true
          description: The coworker whose call is gated.
        rationale:
          type: string
          nullable: true
          description: The agent's free-text "why I'm calling this tool" (nullable).
        status:
          type: string
          enum: [pending, approved, rejected, expired, cancelled]
          description: |
            Lifecycle status. Always `pending` on the tenant-wide inbox read
            (`GET /approvals/requests`); the conversation sub-resource
            (`GET /conversations/{id}/approval-requests`) returns every state so
            resolved cards re-render inline in chat history.
        decided_at:
          type: string
          format: date-time
          nullable: true
          description: When the request was resolved; null while pending.
        note:
          type: string
          nullable: true
          description: The approver's note on a reject; null otherwise.
        triggered_by:
          allOf:
            - $ref: '#/components/schemas/ApprovalTriggeredBy'
          nullable: true
          description: |
            Safety-rule provenance (§3.10); null for a business-policy
            approval. Always null today — see ApprovalTriggeredBy.

    # -----------------------------------------------------------------
    # Skills (design §3 Phase 3 / docs/19-skills-architecture.md)
    # -----------------------------------------------------------------

    SkillFile:
      type: object
      required: [path, content]
      properties:
        path: { type: string }
        content: { type: string }
        mime_type:
          type: string
          default: text/plain
        updated_at:
          type: string
          format: date-time

    SkillFileUpsert:
      type: object
      required: [content]
      properties:
        content: { type: string }
        mime_type:
          type: string
          default: text/plain

    Skill:
      type: object
      required:
        - id
        - tenant_id
        - name
        - enabled
        - visibility
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        enabled: { type: boolean }
        frontmatter_common:
          type: object
          additionalProperties: true
        frontmatter_backend:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
        files:
          type: object
          description: |
            Map of `path` → `SkillFile`. `SKILL.md` is always present
            (application invariant; deleting it is rejected with 409
            `SKILL_MANIFEST_PROTECTED`).
          additionalProperties: { $ref: '#/components/schemas/SkillFile' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        created_by_user_id:
          type: string
          format: uuid
          nullable: true
        visibility: { $ref: '#/components/schemas/Visibility' }

    SkillSummary:
      type: object
      description: |
        List-view projection — drops the file map and frontmatter.
        Use `GET /api/v1/skills/{id}` for the full payload.
      required:
        - id
        - tenant_id
        - name
        - description
        - enabled
        - bound_coworker_count
        - visibility
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        bound_coworker_count:
          type: integer
          minimum: 0
          description: |
            Number of `coworker_skills` rows referencing this skill,
            any enabled state. The list page renders this so admins
            can spot orphaned vs heavily-shared skills.
        visibility: { $ref: '#/components/schemas/Visibility' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        created_by_user_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Owner of the skill, or null for platform-default rows.
            Surfaced on the list projection so the role-aware skills
            page can drive ownership-escape affordances without an
            N+1 fetch of each full skill.

    SkillCreate:
      type: object
      required: [name, files]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{0,63}$'
          description: |
            Lowercase letters, digits, hyphens. First character must
            be alphanumeric (no leading hyphen — shells and CLI tools
            misread leading-hyphen names as flags). Reserved names
            `anthropic` and `claude` are rejected by an additional
            server-side validator (Pydantic field_validator) since the
            pattern alone cannot express the exclusion.
        enabled:
          type: boolean
          default: true
        files:
          type: object
          description: |
            Map of `path` → file content. `SKILL.md` is required —
            its frontmatter populates `frontmatter_common` and
            `frontmatter_backend`.
          additionalProperties:
            oneOf:
              - type: string
              - $ref: '#/components/schemas/SkillFileUpsert'
        frontmatter_common:
          type: object
          additionalProperties: true
          nullable: true
        frontmatter_backend:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
          nullable: true

    SkillUpdate:
      type: object
      description: |
        Two modes. Set `enabled` / `frontmatter_common` /
        `frontmatter_backend` for a metadata-only edit, OR set `files`
        to swap the entire `skill_files` map atomically (matches the
        create path's semantics, useful for the edit dialog that
        already has the full file set in memory). `name` is read-only
        on PATCH — sending a value that matches the existing skill is
        accepted; a differing value 400s.
      properties:
        name:
          type: string
          description: |
            Optional; must match the existing skill's name when
            present. Rejected with 400 if it differs.
        enabled:
          type: boolean
        files:
          type: object
          description: |
            Full file-set replacement when present. `SKILL.md` is
            required; its frontmatter re-populates
            `frontmatter_common` / `frontmatter_backend`.
          additionalProperties:
            oneOf:
              - type: string
              - $ref: '#/components/schemas/SkillFileUpsert'
          nullable: true
        frontmatter_common:
          type: object
          additionalProperties: true
          nullable: true
        frontmatter_backend:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
          nullable: true

    CoworkerSkillBinding:
      type: object
      description: |
        One `coworker_skills` row, wire-side. The skill is
        projection-eligible only when `enabled` here is true AND
        the parent catalog skill's `enabled` flag is also true
        (double-AND, design §6.3 C).
      required: [coworker_id, skill_id, enabled]
      properties:
        coworker_id: { type: string, format: uuid }
        skill_id: { type: string, format: uuid }
        enabled: { type: boolean }

    Run:
      type: object
      required: [id, conversation_id, status]
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/RunStatus' }
        usage:
          $ref: '#/components/schemas/RunUsage'
        error:
          allOf:
            - $ref: '#/components/schemas/RunError'
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    SafetyStage:
      type: string
      enum:
        - input_prompt
        - pre_tool_call
        - post_tool_result
        - model_output
        - pre_compaction
        - egress_request

    SafetyVerdictAction:
      type: string
      enum: [allow, block, redact, warn, require_approval]

    SafetyCheckCostClass:
      type: string
      enum: [cheap, slow]

    SafetyCheckActionModel:
      type: string
      enum: [fixed, config_routed, aggregated]

    SafetyFindingSeverity:
      type: string
      enum: [info, low, medium, high, critical]

    SafetyRuleAuditAction:
      type: string
      enum: [created, updated, deleted]

    SafetyRule:
      type: object
      required:
        - id
        - tenant_id
        - stage
        - check_id
        - priority
        - enabled
        - description
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        coworker_id:
          type: string
          format: uuid
          nullable: true
          description: |
            `null` means the rule is tenant-wide (applies to every
            coworker). Non-null binds the rule to a single coworker.
        stage: { $ref: '#/components/schemas/SafetyStage' }
        check_id: { type: string }
        config:
          type: object
          additionalProperties: true
        priority: { type: integer }
        enabled: { type: boolean }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        source:
          type: string
          enum: [tenant, platform]
          default: tenant
          description: |
            Platform Safety Rules (PR #49). `tenant` rules are owned by the
            organization and editable on the admin surface; `platform` rules
            are cross-tenant defaults set by the platform admin — read-only
            here. The SPA renders the two tiers in separate sections (§6.2).
        tier:
          type: string
          enum: [floor, transparent_floor, default]
          nullable: true
          description: |
            Platform-rule tier; null for tenant-owned rules. Set only when
            `source == platform`.
        editable:
          type: boolean
          default: true
          description: |
            Convenience flag the SPA uses to show/hide edit / duplicate /
            delete affordances without re-deriving from `source`. False for
            platform rules (audit-only).

    SafetyCheck:
      type: object
      required:
        - id
        - version
        - stages
        - cost_class
        - action_model
      properties:
        id: { type: string }
        version: { type: string }
        stages:
          type: array
          items: { $ref: '#/components/schemas/SafetyStage' }
        cost_class: { $ref: '#/components/schemas/SafetyCheckCostClass' }
        supported_codes:
          type: array
          items: { type: string }
        config_schema:
          type: object
          additionalProperties: true
          nullable: true
        # Per-stage default action a hit produces under the default
        # config. Descriptive metadata for the rule editor; the
        # pipeline does not consume it.
        action_model: { $ref: '#/components/schemas/SafetyCheckActionModel' }
        natural_actions:
          type: object
          additionalProperties: { $ref: '#/components/schemas/SafetyVerdictAction' }
        # Per-stage set of actions a rule on this (check, stage) can
        # meaningfully produce, used by the editor to grey out invalid
        # action overrides.
        supported_actions:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/SafetyVerdictAction' }

    SafetyFinding:
      type: object
      required: [code, severity, message]
      properties:
        code: { type: string }
        severity: { $ref: '#/components/schemas/SafetyFindingSeverity' }
        message: { type: string }
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    SafetyDecision:
      type: object
      required:
        - id
        - tenant_id
        - stage
        - verdict_action
        - context_digest
        - context_summary
        - created_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        coworker_id:
          type: string
          format: uuid
          nullable: true
        conversation_id:
          type: string
          nullable: true
        job_id:
          type: string
          nullable: true
        stage: { $ref: '#/components/schemas/SafetyStage' }
        verdict_action: { $ref: '#/components/schemas/SafetyVerdictAction' }
        triggered_rule_ids:
          type: array
          items: { type: string, format: uuid }
        findings:
          type: array
          items: { $ref: '#/components/schemas/SafetyFinding' }
        context_digest: { type: string }
        context_summary: { type: string }
        source:
          type: string
          enum: [tenant, platform]
          default: tenant
          description: |
            `platform` when any triggered rule is platform-owned, else
            `tenant`. Lets the log filter platform-rule hits at a glance.
        created_at: { type: string, format: date-time }

    SafetyDecisionPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SafetyDecision' }
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0

    # Offset/limit page envelopes. One named schema per resource (clean TS
    # type names); all share {items, total, limit, offset}.
    UserPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/UserResponse' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    SafetyRulePage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SafetyRule' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    ScheduledTaskPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ScheduledTask' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    ApprovalPolicyPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ApprovalPolicy' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    ApprovalRequestPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ApprovalRequest' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    CoworkerPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Coworker' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    SkillSummaryPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SkillSummary' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    MCPServerPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/MCPServer' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    ConversationPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    SafetyRuleAuditPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SafetyRuleAuditEntry' }
        total: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }

    MessagePage:
      type: object
      required: [items, has_more]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Message' }
        has_more: { type: boolean }
        next_cursor:
          type: string
          nullable: true
          description: >-
            Opaque cursor for the next OLDER page; pass back as the
            `before` query param. Null when there are no older messages.

    SafetyRuleAuditEntry:
      type: object
      required:
        - id
        - rule_id
        - tenant_id
        - action
        - created_at
      properties:
        id: { type: string, format: uuid }
        rule_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        action: { $ref: '#/components/schemas/SafetyRuleAuditAction' }
        actor_user_id:
          type: string
          format: uuid
          nullable: true
        before_state:
          type: object
          additionalProperties: true
          nullable: true
        after_state:
          type: object
          additionalProperties: true
          nullable: true
        created_at: { type: string, format: date-time }

    # -----------------------------------------------------------------
    # PR24 — gap-closing schemas (schedules, channel bindings, admin
    # models). All three already existed on the backend (DB tables +
    # helpers, or — for bindings — full admin REST); PR24 exposes them
    # on /api/v1 with typed schemas so the SPA can drop them.
    # -----------------------------------------------------------------

    ScheduleType:
      type: string
      enum: [cron, interval, once]
      description: |
        How `schedule_value` is interpreted. `cron` uses crontab
        syntax; `interval` is a duration string ("5m", "1h");
        `once` is a single ISO-8601 timestamp.

    ScheduleStatus:
      type: string
      enum: [active, paused, completed, cancelled]
      description: |
        `completed` is the terminal state for `once` schedules after
        they've fired. `paused` is a manual halt — the row stays but
        the orchestrator skips it. `cancelled` is the soft-cancel
        terminal set by `cancel_tasks_for_user` (v6.1 §P1.8) when
        the task's creator is removed from the tenant.

    ScheduleContextMode:
      type: string
      enum: [group, isolated]
      description: |
        `isolated` — each fire spawns a fresh agent without prior
        context. `group` — reuses the bound conversation so memory
        carries across firings.

    ScheduledTask:
      type: object
      required:
        - id
        - tenant_id
        - coworker_id
        - prompt
        - schedule_type
        - schedule_value
        - context_mode
        - status
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        coworker_id: { type: string, format: uuid }
        conversation_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Required when `context_mode == group`; null when
            `isolated`. Null `group` rows are a data-model bug — the
            orchestrator drops them with a warning.
        prompt: { type: string }
        schedule_type: { $ref: '#/components/schemas/ScheduleType' }
        schedule_value: { type: string }
        context_mode: { $ref: '#/components/schemas/ScheduleContextMode' }
        next_run:
          type: string
          format: date-time
          nullable: true
        last_run:
          type: string
          format: date-time
          nullable: true
        last_result:
          type: string
          nullable: true
        status: { $ref: '#/components/schemas/ScheduleStatus' }
        created_at: { type: string, format: date-time }

    ChannelLinkToken:
      type: object
      required: [token, expires_at]
      description: |
        v6.1 §P1.4 — handed back from
        `POST /api/v1/me/channel-links/telegram`. `deep_link` is the
        preferred entry point when the tenant's bot @username is known;
        otherwise the SPA shows `token` for copy-paste.
      properties:
        token:
          type: string
          minLength: 22
          description: One-shot URL-safe token; lifetime ≈ 10 min.
        expires_at:
          type: string
          format: date-time
        deep_link:
          type: string
          nullable: true
          description: |
            `https://t.me/<bot>?start=<token>` if a Telegram bot
            @username is on file for the tenant; null when the SPA
            should fall back to the copy-paste UI.

    ChannelLinkIdentity:
      type: object
      required: [id, platform, channel_id]
      description: |
        v6.1 §P1.4 — one `user_channel_identities` row as seen by the
        SPA. `channel_id` is the platform-native sender id (opaque
        from the SPA's perspective).
      properties:
        id: { type: string, format: uuid }
        platform:
          type: string
          enum: [telegram]
        channel_id:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true

    ChannelBinding:
      type: object
      required:
        - id
        - coworker_id
        - tenant_id
        - channel_type
        - status
      properties:
        id: { type: string, format: uuid }
        coworker_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        channel_type: { $ref: '#/components/schemas/ChannelType' }
        bot_display_name:
          type: string
          nullable: true
        status:
          type: string
          description: |
            Free-form status string set by the gateway (e.g.
            `active`, `error: bot_token rejected`). The UI renders it
            verbatim; no enum because gateways may surface
            channel-specific error states.
        created_at:
          type: string
          format: date-time
          nullable: true

    ChannelBindingCreate:
      type: object
      required: [channel_type, credentials]
      properties:
        channel_type: { $ref: '#/components/schemas/ChannelType' }
        credentials:
          type: object
          additionalProperties: { type: string }
          description: |
            Channel-specific credential map. Shape is per gateway:
            Slack expects `bot_token` + `app_token`; Telegram expects
            `bot_token`; `web` accepts an empty map. The values are
            stored encrypted at rest (envelope encryption — same
            machinery as /credentials).
        bot_display_name:
          type: string
          nullable: true

    ChannelBindingUpdate:
      type: object
      properties:
        credentials:
          type: object
          additionalProperties: { type: string }
          nullable: true
          description: |
            When provided, replaces the entire credentials map (not
            a merge). Omit to leave credentials untouched.
        bot_display_name:
          type: string
          nullable: true

    ModelCreate:
      type: object
      required: [provider, model_id, model_family, display_name]
      properties:
        provider: { $ref: '#/components/schemas/ModelProvider' }
        model_id:
          type: string
          minLength: 1
          maxLength: 200
        model_family: { $ref: '#/components/schemas/ModelFamily' }
        display_name:
          type: string
          minLength: 1
          maxLength: 200
        is_active:
          type: boolean
          default: true

    ModelUpdate:
      type: object
      description: |
        All fields optional. `is_active: false` here is preferred
        over DELETE for already-bound models (DELETE returns 409 on
        in-use rows; this lets an operator hide a deprecated model
        from new bindings without dropping the row).
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 200
        is_active:
          type: boolean

    # -----------------------------------------------------------------
    # WebSocket frame schemas (PR23).
    #
    # OpenAPI 3 has no native channel/subscription model (that's
    # AsyncAPI's job), but the JSON SHAPE of every frame in a ws
    # message is plain JSON, so it fits cleanly under components/
    # schemas. Each direction is a discriminated union on the `type`
    # field; codegen produces a tagged union on the TS side and the
    # backend uses Pydantic discriminated unions for symmetric
    # validation (see `WsServerEventModel` in schemas_v1.py).
    #
    # Channel: WS /api/v1/conversations/{id}/stream
    # (handshake authenticated via `?ticket=` query, minted by
    # POST /auth/ws-ticket).
    # -----------------------------------------------------------------

    WsServerEventRunStarted:
      type: object
      required: [type, run_id, idempotent]
      properties:
        type: { type: string, enum: [event.run.started] }
        run_id: { type: string, format: uuid }
        idempotent:
          type: boolean
          description: |
            True when the request.run carried an idempotency_key that
            matched a still-active in-flight run; the server-side run
            wasn't created twice and the client should observe the
            existing run's tokens.

    WsServerEventRunToken:
      type: object
      required: [type, run_id, delta]
      properties:
        type: { type: string, enum: [event.run.token] }
        run_id: { type: string, format: uuid }
        delta:
          type: string
          description: |
            Newly produced assistant text since the previous token
            event. Always a (possibly empty) string — never a chunk
            schema or structured content.

    WsServerEventRunCompleted:
      type: object
      required: [type, run_id]
      properties:
        type: { type: string, enum: [event.run.completed] }
        run_id: { type: string, format: uuid }

    WsServerEventRunError:
      type: object
      required: [type, code, message]
      properties:
        type: { type: string, enum: [event.run.error] }
        run_id:
          type: string
          format: uuid
          description: |
            Optional. Omitted for protocol-level errors that fire
            before a run is created (e.g. PROTOCOL_BAD_JSON,
            PROTOCOL_UNKNOWN_TYPE).
        code:
          type: string
          description: |
            Stable error code. Known values include SAFETY_BLOCKED,
            PROTOCOL_BAD_JSON, PROTOCOL_UNKNOWN_TYPE,
            PROTOCOL_MISSING_RUN_ID, FORBIDDEN, NOT_FOUND.
        message: { type: string }
        details:
          type: object
          additionalProperties: true
          nullable: true

    WsServerEventRunProgress:
      type: object
      required: [type, run_id, status]
      properties:
        type: { type: string, enum: [event.run.progress] }
        run_id: { type: string, format: uuid }
        status:
          type: string
          description: |
            Granular phase of the active run. Today's set:
            `running`, `tool_use`, `queued`, `container_starting`.
            Kept as an open string (not an enum) so a new
            orchestrator progress kind doesn't have to fail
            validation before the SPA learns about it; unknown
            values render via the fallback label.
        tool:
          type: string
          nullable: true
          description: |
            Tool name when `status == tool_use`. Null otherwise.
        input_preview:
          type: string
          nullable: true
          description: |
            Truncated preview of the tool input (orchestrator
            truncates server-side; the name carries the semantic).
            Null for non-tool statuses.

    WsServerEventMessageAppended:
      type: object
      required: [type, content, source, timestamp]
      properties:
        type: { type: string, enum: [event.message.appended] }
        content: { type: string }
        source:
          type: string
          enum: [scheduled_task]
          description: |
            What pushed this message. Currently only scheduled-task
            replies; future side-channel deliveries (cross-chat,
            agent-to-agent) extend the enum.
        timestamp:
          type: string
          format: date-time
          description: |
            Server clock at forward time. The SPA uses this for
            bubble ordering when no DB read has happened yet (the
            persisted row's authoritative timestamp may differ
            slightly; the next reload will reconcile via GET
            /api/v1/conversations/{id}/messages).
        # No run_id: out-of-band agent messages aren't bound to a
        # user-initiated request.run lifecycle. The SPA renders them
        # the same way it renders messages fetched from REST on
        # reload — synthesising a fake run_id would pollute the
        # client-side run map and confuse the cancel/stop paths.

    WsServerEventApprovalRequested:
      type: object
      required: [type, request_id]
      properties:
        type: { type: string, enum: [event.approval.requested] }
        request_id:
          type: string
          format: uuid
          description: |
            The approval the SPA echoes back in a
            request.approval_decision frame. HITL tool approval
            (docs/12-hitl-approval-architecture.md §10 S4). Carried out-of-band
            like event.message.appended — an approval can outlive the
            run that triggered it, and scheduled-task approvals have no
            run at all.
        mcp_server_name:
          type: string
          nullable: true
          description: The gated MCP server identity (§1.1).
        tool_name:
          type: string
          nullable: true
          description: The gated tool name (§1.1).
        params:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Raw tool input arguments — the decision input (§1.1). Without
            it the card cannot be informative.
        coworker_id:
          type: string
          format: uuid
          nullable: true
          description: The coworker whose call is gated (§1.1).
        conversation_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Originating conversation; null for scheduled-task approvals
            that have no live conversation (§1.1).
        requested_at:
          type: string
          nullable: true
          description: When the approval became pending (ISO-8601, §1.1).
        rationale:
          type: string
          nullable: true
          description: |
            The agent's "why I'm calling this tool" (§1.1). Nullable; the
            card omits the section when null.
        action_summary:
          type: string
          nullable: true
          description: One-line human summary of the gated tool call.
        expires_at:
          type: string
          nullable: true
          description: When the pending approval auto-expires (ISO-8601).
        triggered_by:
          allOf:
            - $ref: '#/components/schemas/ApprovalTriggeredBy'
          nullable: true
          description: |
            Safety-rule provenance (§3.10); null for a business-policy
            approval. Always null today — see ApprovalTriggeredBy.

    WsServerEventApprovalResolved:
      type: object
      required: [type, request_id, outcome]
      properties:
        type: { type: string, enum: [event.approval.resolved] }
        request_id: { type: string, format: uuid }
        outcome:
          type: string
          enum: [approved, rejected, expired, cancelled]
          description: |
            The orchestrator's deterministic terminal state (no LLM in
            the loop). The SPA edits the card in place. `cancelled` =
            the coworker's container withdrew the call (Stop / hook
            exception), distinct from `expired` (no decision in time).

    # Frontdesk v1.5 delegation child-chip events. A specialist running
    # in a delegation child conversation surfaces its progress to the
    # PARENT conversation's stream as an indented sub-chip. These ride
    # the existing web.stream.* carrier (kind="child_chip") and the v1
    # ws_stream projects them into the four typed frames below — see
    # WsServerEventDelegation* and ws_stream._build_child_chip_frame_or_none.
    # child_conv_id is the chip key; concurrent delegations render as
    # separate chips. run_id anchors the chip to the parent's active run
    # so the SPA can drop orphaned chips on event.run.completed.
    WsServerEventDelegationStarted:
      type: object
      required: [type, run_id, child_conv_id, delegation_id, target_folder, target_name]
      properties:
        type: { type: string, enum: [event.delegation.started] }
        run_id: { type: string, format: uuid }
        child_conv_id:
          type: string
          format: uuid
          description: |
            Child (internal) conversation id; the SPA keys each sub-chip
            by this. Mounted on started, unmounted on completed.
        delegation_id: { type: string, format: uuid }
        target_folder: { type: string }
        target_name: { type: string }
        context_mode:
          type: string
          nullable: true
          description: "'isolated' | 'sticky' — delegation context carry-over."
        initial_status: { type: string, nullable: true }

    WsServerEventDelegationProgress:
      type: object
      required: [type, run_id, child_conv_id, delegation_id, target_folder, target_name, status]
      properties:
        type: { type: string, enum: [event.delegation.progress] }
        run_id: { type: string, format: uuid }
        child_conv_id: { type: string, format: uuid }
        delegation_id: { type: string, format: uuid }
        target_folder: { type: string }
        target_name: { type: string }
        status:
          type: string
          description: |
            Specialist container phase: running / queued / container_starting.
            Open string (mirrors event.run.progress.status) so a new
            orchestrator kind renders via fallback rather than failing
            validation.

    WsServerEventDelegationToolUse:
      type: object
      required: [type, run_id, child_conv_id, delegation_id, target_folder, target_name, tool_name]
      properties:
        type: { type: string, enum: [event.delegation.tool_use] }
        run_id: { type: string, format: uuid }
        child_conv_id: { type: string, format: uuid }
        delegation_id: { type: string, format: uuid }
        target_folder: { type: string }
        target_name: { type: string }
        tool_name:
          type: string
          nullable: true
          description: Tool the specialist is invoking; null if unknown.
        tool_input_preview:
          type: string
          nullable: true
          description: |
            Truncated preview of the specialist's tool input (orchestrator
            truncates server-side; the name carries the semantic, same as
            event.run.progress.input_preview).

    WsServerEventDelegationCompleted:
      type: object
      required: [type, run_id, child_conv_id, delegation_id, target_folder, target_name, final_status]
      properties:
        type: { type: string, enum: [event.delegation.completed] }
        run_id: { type: string, format: uuid }
        child_conv_id: { type: string, format: uuid }
        delegation_id: { type: string, format: uuid }
        target_folder: { type: string }
        target_name: { type: string }
        final_status:
          type: string
          description: "success | error | cancelled | timeout — delegation terminal state."
        duration_ms: { type: integer, nullable: true }

    # Server → client. Discriminated on `type`; clients can pattern
    # match on the literal and TS narrows to the matching member.
    WsServerEvent:
      oneOf:
        - $ref: '#/components/schemas/WsServerEventRunStarted'
        - $ref: '#/components/schemas/WsServerEventRunToken'
        - $ref: '#/components/schemas/WsServerEventRunCompleted'
        - $ref: '#/components/schemas/WsServerEventRunError'
        - $ref: '#/components/schemas/WsServerEventRunProgress'
        - $ref: '#/components/schemas/WsServerEventMessageAppended'
        - $ref: '#/components/schemas/WsServerEventApprovalRequested'
        - $ref: '#/components/schemas/WsServerEventApprovalResolved'
        - $ref: '#/components/schemas/WsServerEventDelegationStarted'
        - $ref: '#/components/schemas/WsServerEventDelegationProgress'
        - $ref: '#/components/schemas/WsServerEventDelegationToolUse'
        - $ref: '#/components/schemas/WsServerEventDelegationCompleted'
      discriminator:
        propertyName: type
        mapping:
          event.run.started: '#/components/schemas/WsServerEventRunStarted'
          event.run.token: '#/components/schemas/WsServerEventRunToken'
          event.run.completed: '#/components/schemas/WsServerEventRunCompleted'
          event.run.error: '#/components/schemas/WsServerEventRunError'
          event.run.progress: '#/components/schemas/WsServerEventRunProgress'
          event.message.appended: '#/components/schemas/WsServerEventMessageAppended'
          event.approval.requested: '#/components/schemas/WsServerEventApprovalRequested'
          event.approval.resolved: '#/components/schemas/WsServerEventApprovalResolved'
          event.delegation.started: '#/components/schemas/WsServerEventDelegationStarted'
          event.delegation.progress: '#/components/schemas/WsServerEventDelegationProgress'
          event.delegation.tool_use: '#/components/schemas/WsServerEventDelegationToolUse'
          event.delegation.completed: '#/components/schemas/WsServerEventDelegationCompleted'

    WsClientFrameRequestRun:
      type: object
      required: [type, input, idempotency_key]
      properties:
        type: { type: string, enum: [request.run] }
        input:
          type: string
          description: User input text for this run.
        idempotency_key:
          type: string
          description: |
            Client-minted UUID. The server caches (conversation_id,
            idempotency_key) → run_id for the lifetime of the run so
            a reconnect that re-sends the same frame observes the
            same run (idempotent: true on event.run.started).

    WsClientFrameRequestCancel:
      type: object
      required: [type, run_id]
      properties:
        type: { type: string, enum: [request.cancel] }
        run_id: { type: string, format: uuid }

    WsClientFrameRequestStop:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [request.stop] }
        run_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Advisory only — logged for traceability but not used for
            routing. The orchestrator identifies the target container
            from binding_id+chat_id (both pulled from the
            authenticated handshake, NOT from any client payload —
            IDOR guard, see webui/ws.py:228-231 for the original
            legacy comment). The SPA may not know a run_id yet (race
            between fast Stop click and the first event.run.started
            echo); the field is therefore optional.

    WsClientFrameApprovalDecision:
      type: object
      required: [type, request_id, decision]
      properties:
        type: { type: string, enum: [request.approval_decision] }
        request_id: { type: string, format: uuid }
        decision:
          type: string
          enum: [approve, reject]
        note:
          type: string
          nullable: true
          description: Optional free-text rationale shown to the agent.
        # No approver identity field by design: the server stamps the
        # authenticated user_id/tenant_id from the verified WS ticket
        # when it relays to the orchestrator (IDOR guard, same posture
        # as request.stop). A browser cannot forge who approved.

    # Client → server.
    WsClientFrame:
      oneOf:
        - $ref: '#/components/schemas/WsClientFrameRequestRun'
        - $ref: '#/components/schemas/WsClientFrameRequestCancel'
        - $ref: '#/components/schemas/WsClientFrameRequestStop'
        - $ref: '#/components/schemas/WsClientFrameApprovalDecision'
      discriminator:
        propertyName: type
        mapping:
          request.run: '#/components/schemas/WsClientFrameRequestRun'
          request.cancel: '#/components/schemas/WsClientFrameRequestCancel'
          request.stop: '#/components/schemas/WsClientFrameRequestStop'
          request.approval_decision: '#/components/schemas/WsClientFrameApprovalDecision'

    # -----------------------------------------------------------------
    # Tenant administration (migrated off /api/admin): users + tenant.
    # -----------------------------------------------------------------
    UserResponse:
      type: object
      required: [id, tenant_id, name, role, channel_ids, created_at]
      properties:
        id: { type: string }
        tenant_id: { type: string }
        name: { type: string }
        email: { type: string, nullable: true }
        role:
          type: string
          enum: [owner, admin, member]
        channel_ids:
          type: object
          additionalProperties: { type: string }
          description: |
            Map of channel type → external identity id (e.g.
            `{"telegram": "12345"}`).
        created_at: { type: string }

    UserDetailResponse:
      allOf:
        - $ref: '#/components/schemas/UserResponse'
      description: |
        Detailed user view. Currently identical to `UserResponse`; the
        former per-user agent-grant list was removed when access moved to
        coworker visibility + ownership.

    UserCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, nullable: true }
        role:
          type: string
          enum: [owner, admin, member]
          default: member
          description: |
            Creating an `owner` requires the caller to be an owner.
        channel_ids:
          type: object
          additionalProperties: { type: string }

    UserUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email:
          type: string
          nullable: true
          description: Send "" to clear; omit or null to leave unchanged.
        role:
          type: string
          enum: [owner, admin, member]
          description: Assigning `owner` requires the caller to be an owner.

    TenantResponse:
      type: object
      required: [id, name, max_concurrent_containers, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string, nullable: true }
        plan: { type: string, nullable: true }
        max_concurrent_containers: { type: integer }
        created_at: { type: string }

    TenantUpdate:
      type: object
      properties:
        name: { type: string }
        max_concurrent_containers:
          type: integer
          minimum: 1
          maximum: 100

    # -----------------------------------------------------------------
    # Safety rule write bodies (migrated off /api/admin/safety/rules).
    # -----------------------------------------------------------------
    SafetyRuleCreate:
      type: object
      required: [stage, check_id]
      properties:
        stage: { $ref: '#/components/schemas/SafetyStage' }
        check_id: { type: string, minLength: 1, maxLength: 128 }
        config:
          type: object
          additionalProperties: true
        coworker_id:
          type: string
          format: uuid
          nullable: true
          description: |
            `null` → tenant-wide rule. Non-null binds to one coworker and
            must be in the caller's tenant (else 404).
        priority: { type: integer, minimum: -1000, maximum: 1000, default: 100 }
        enabled: { type: boolean, default: true }
        description: { type: string, maxLength: 500, default: "" }

    SafetyRuleUpdate:
      type: object
      properties:
        stage: { $ref: '#/components/schemas/SafetyStage' }
        check_id: { type: string, minLength: 1, maxLength: 128 }
        config:
          type: object
          additionalProperties: true
        priority: { type: integer, minimum: -1000, maximum: 1000 }
        enabled: { type: boolean }
        description: { type: string, maxLength: 500 }

    PlatformSafetyTier:
      type: string
      enum: [floor, transparent_floor, default]

    PlatformSafetyRule:
      type: object
      required:
        - id
        - tier
        - stage
        - check_id
        - priority
        - enabled
        - description
        - is_seeded
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tier: { $ref: '#/components/schemas/PlatformSafetyTier' }
        stage: { $ref: '#/components/schemas/SafetyStage' }
        check_id: { type: string }
        config:
          type: object
          additionalProperties: true
        priority: { type: integer }
        enabled: { type: boolean }
        description: { type: string }
        is_seeded:
          type: boolean
          description: |
            True for the shipped factory defaults (seeded at build time).
            These are managed disable-only: editable and disablable, but a
            hard DELETE is refused (`409`) since the next seed would
            recreate them. Platform-admin-created rules carry `false`.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PlatformSafetyRuleCreate:
      type: object
      required: [tier, stage, check_id]
      properties:
