        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/mcp-servers/{id}:
    parameters:
      - $ref: '#/components/parameters/IdInPath'
    get:
      tags: [MCPServers]
      operationId: getMCPServer
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
