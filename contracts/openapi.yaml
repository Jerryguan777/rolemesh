        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [MCPServers]
      operationId: updateMCPServer
      summary: Partially update an MCP server
      description: |
        Publishes one `egress.mcp.changed` event (`action="updated"`)
        on success.
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MCPServerUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MCPServer' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [MCPServers]
      operationId: deleteMCPServer
      summary: Delete an MCP server
      description: |
        Returns `409 RESOURCE_IN_USE` (with `details.coworker_ids`)
        when at least one coworker still binds this MCP server.
        Publishes one `egress.mcp.changed` event (`action="deleted"`)
        on success.
      security: [ { bearerAuth: [] } ]
      responses:
        '204':
          description: No content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            MCP server is still referenced by at least one coworker.
            `code="RESOURCE_IN_USE"`, `details.coworker_ids` lists
            the offenders.
