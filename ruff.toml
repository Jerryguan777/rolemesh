target-version = "py312"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific
    "BLE",  # flake8-blind-except
]
ignore = [
    "E501",   # line length handled by formatter
]

[lint.isort]
known-first-party = ["rolemesh", "agent_runner", "webui"]

[format]
quote-style = "double"
indent-style = "space"
