target-version = "py312"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific
    "BLE",  # flake8-blind-except
]
ignore = [
    "E501",   # line length handled by formatter
    # Em-dash and other typographic Unicode in prose (docstrings / comments /
    # the occasional string) is intentional, not a homoglyph hazard.
    "RUF001", # ambiguous-unicode-character-string
    "RUF002", # ambiguous-unicode-character-docstring
    "RUF003", # ambiguous-unicode-character-comment
]

[lint.isort]
known-first-party = ["rolemesh", "agent_runner", "webui"]

[lint.flake8-bugbear]
# FastAPI's dependency-injection markers are evaluated once at import and are
# the framework's documented idiom in parameter defaults — not the mutable /
# side-effecting call B008 targets.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Body",
    "fastapi.Form",
    "fastapi.File",
    "fastapi.Cookie",
    "fastapi.Security",
]

[format]
quote-style = "double"
indent-style = "space"
