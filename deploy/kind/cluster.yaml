# kind cluster config for RoleMesh local k8s integration (docs/21 §10.3).
#
# Used by up.sh: `kind create cluster --config cluster.yaml`.
#
# Two deliberate choices:
#   1. disableDefaultCNI: true — kindnet does NOT enforce NetworkPolicy, so
#      agent isolation would be a false green. up.sh installs Calico after
#      the cluster comes up.
#   2. The Service subnet is left at kind's default 10.96.0.0/12. The
#      gateway's static ClusterIP in values-kind.yaml (10.96.0.53) lives in
#      this range (kube-dns is 10.96.0.10). If you change podSubnet/
#      serviceSubnet here, change egressGateway.clusterIP to match.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: rolemesh
networking:
  # kindnet has no NetworkPolicy support — install Calico instead (up.sh).
  disableDefaultCNI: true
  # Defaults shown explicitly so the Service CIDR contract is documented at
  # the source. serviceSubnet's first usable range is 10.96.0.0/12.
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
nodes:
  - role: control-plane
    # Single node: matches the rwo-colocated / local-path storage model.
    # extraMounts can map a host data dir if you want agent data to survive
    # cluster recreation; not required for the basic loop.
