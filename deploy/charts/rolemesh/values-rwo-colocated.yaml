# RoleMesh with ReadWriteOnce storage + co-location (docs/21 §7.2).
#
#   helm upgrade --install rolemesh deploy/charts/rolemesh \
#     -n rolemesh --create-namespace \
#     -f deploy/charts/rolemesh/values-rwo-colocated.yaml
#
# Use this when the cluster has NO ReadWriteMany StorageClass (no Longhorn
# RWX / no NFS). The data PVC is requested RWO; the orchestrator mounts it
# directly (scheduler pins it to the PVC's node), and the agent pods the
# orchestrator spawns mount the same RWO PVC and therefore co-locate
# automatically (a second node attaching blocks with a Multi-Attach error).
#
# Everything else inherits values.yaml defaults; set egressGateway.clusterIP
# for your cluster's Service CIDR (no safe default — see values.yaml).

storage:
  mode: rwo-colocated
  size: 10Gi
  # Name your RWO StorageClass if it is not the cluster default.
  storageClass: ""

# REQUIRED — set to a free address in your cluster's Service CIDR:
#   kubectl -n kube-system get svc kube-dns -o jsonpath='{.spec.clusterIP}'
# egressGateway:
#   clusterIP: "10.43.0.53"   # e.g. RKE2 default Service CIDR 10.43.0.0/16

# RKE2 default Service CIDR is 10.43.0.0/16; uncomment + adjust above.

# Production should point at a managed Postgres rather than the bundled one
# (PSA-restricted incompatibility — see values.yaml). Example:
# postgres:
#   enabled: false
#   externalUrl: "postgresql://rolemesh:CHANGEME@pg.internal:5432/rolemesh"
#   externalAdminUrl: "postgresql://rolemesh_admin:CHANGEME@pg.internal:5432/rolemesh"
