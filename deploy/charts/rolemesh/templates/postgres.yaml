{{- if .Values.postgres.enabled }}
{{- /*
Bundled Postgres (no external subchart; switch off with postgres.enabled=
false + postgres.externalUrl). Pod carries app.kubernetes.io/component:
postgres so orchestrator-policy can reach it. Password comes from the
chart Secret, never a plain values field.

NOTE: the official postgres:16 image normally chowns its data dir and steps
down to the `postgres` user via gosu — which trips PSA `restricted`. It
runs fine rootless when (a) the pod's fsGroup owns the mounted data dir so
an arbitrary non-root uid can write it, and (b) PGDATA is a subdir the
process creates itself. The securityContext below does exactly that
(runAsNonRoot uid/gid 999 = the image's postgres user, fsGroup 999, drop
ALL caps, seccomp RuntimeDefault). When the entrypoint sees it is already
non-root it skips the chown/gosu dance and runs initdb directly. Treat
bundled Postgres as a dev/PoC convenience; production should point at a
managed instance (postgres.enabled=false + postgres.externalUrl).
*/ -}}
{{- $name := printf "%s-postgres" (include "rolemesh.fullname" .) -}}
{{- $secretName := .Values.secrets.existingSecret | default (include "rolemesh.secretName" .) -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rolemesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rolemesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "rolemesh.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      # PSA restricted-compatible: fsGroup makes the data volume writable
      # by the non-root uid; the image then skips its root chown/gosu path.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_PASSWORD
            # Keep the cluster files in a subdir so the PVC's lost+found
            # (some provisioners) does not trip initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.postgres.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rolemesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
  {{- with .Values.postgres.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- end }}
