{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- /*
Single Secret carrying the cross-component shared secrets. EGRESS_TOKEN_SECRET
is the load-bearing one: the orchestrator and the gateway BOTH mount this
same key, so they cannot drift (docs/21 §6.2). The dev defaults in values let
a fresh install boot; rotate for anything real.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rolemesh.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rolemesh.labels" . | nindent 4 }}
type: Opaque
stringData:
  EGRESS_TOKEN_SECRET: {{ required "secrets.egressTokenSecret is required" .Values.secrets.egressTokenSecret | quote }}
  WS_TICKET_SECRET: {{ required "secrets.wsTicketSecret is required" .Values.secrets.wsTicketSecret | quote }}
  ROLEMESH_TOKEN_SECRET: {{ .Values.secrets.rolemeshTokenSecret | quote }}
  {{- with .Values.secrets.credentialVaultKey }}
  CREDENTIAL_VAULT_KEY: {{ . | quote }}
  {{- end }}
  {{- if and (eq .Values.auth.mode "oidc") .Values.auth.oidc.clientSecret (not .Values.auth.oidc.existingSecret) }}
  OIDC_CLIENT_SECRET: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required when postgres.enabled" .Values.secrets.postgresPassword | quote }}
  {{- end }}
  {{- range $k, $v := .Values.secrets.extra }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
