{{- if .Values.nats.enabled }}
{{- /*
Bundled NATS (no external subchart — this environment cannot pull charts;
docs/21 §10.2 allows switching to an external instance via nats.enabled=
false + nats.externalUrl). Pod carries app.kubernetes.io/component: nats so
the agent/gateway/orchestrator NetworkPolicies select it as a peer.
*/ -}}
{{- /* Workload objects are release-scoped; the Service is the literal
       "nats" so the host matches the docker contract (see _helpers
       rolemesh.natsUrl). */ -}}
{{- $name := printf "%s-nats" (include "rolemesh.fullname" .) -}}
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rolemesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  selector:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rolemesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: nats
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "rolemesh.labels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: {{ .Values.nats.image | quote }}
          args: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.nats.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.nats.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rolemesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.nats.persistence.size }}
  {{- with .Values.nats.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- end }}
