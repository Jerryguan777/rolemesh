name: CI

# Run on PRs against any branch and on direct pushes to the active
# branch namespaces in this repo (main, feat/**, fix/**, safety/**,
# ci/**). Throwaway / personal branches outside these namespaces don't
# trigger directly — open a PR to gate them, which is the same path
# as protected merges anyway.
on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "safety/**"
      - "ci/**"

# Cancel in-flight runs when a new commit arrives on the same ref.
# Saves runner minutes and keeps the latest result authoritative.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # uv install + cache. astral-sh/setup-uv handles caching of the uv
      # tool itself; the venv we cache separately below keyed off uv.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # Pin Python 3.12 to the project's minimum (pyproject.toml requires
      # >=3.12) so CI mirrors the documented dev environment.
      - name: Set up Python 3.12
        run: uv python install 3.12

      # Cache the project venv keyed by uv.lock + Python version. Cached
      # runs restore in seconds.
      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      # safety-ml is intentionally excluded: torch + the llm-guard /
      # presidio transformer models load a copy per pytest-xdist worker,
      # which dominates the job's memory. The ML safety tests guard with
      # pytest.importorskip, so they SKIP (not fail) without the extra —
      # the trade-off is no CI regression coverage on those checks. Run
      # them locally with ``uv sync --extra safety-ml``.
      - name: Install dependencies (dev + pi)
        run: uv sync --python 3.12 --extra dev --extra pi

      # Ruff is a hard gate. The baseline was cleaned to zero (592 -> 0:
      # safe autofixes, FastAPI/unicode config, vendored src/pi excluded,
      # type-only imports guarded, and intentional blind-except / importorskip
      # sites grandfathered with # noqa), so any NEW violation fails CI.
      - name: Ruff lint
        run: uv run ruff check src/ tests/

      # --maxfail=10 stops cascades when one fixture bug takes out a
      # whole subtree, so the failure list stays readable.
      #
      # tests/attack_sim is path-ignored: it drives a real Docker
      # network and isn't marked with @pytest.mark.integration, so the
      # marker filter alone wouldn't exclude it. Everything else with
      # external-service dependencies (NATS, full e2e, multi-tenant
      # flows) should carry the integration marker so the project's
      # default ``addopts = "-m 'not integration'"`` from pyproject.toml
      # deselects it automatically — that path is preferable to a
      # growing CI-side ignore list.
      - name: Pytest
        # -n auto parallelizes across the runner's cores (pytest-xdist). The
        # suite is test-isolated (per-worker testcontainer Postgres, per-test
        # truncate), so workers don't share DB state. Roughly halves wall-clock
        # on the 2-core runner and keeps us clear of the 20-minute job timeout.
        run: uv run pytest tests/ --ignore=tests/attack_sim --maxfail=10 -q -n auto

  # Frontend (web/) job. Independent of the Python test job — runs in
  # parallel on its own runner so it doesn't sit through the ~50-package
  # uv install. Gates:
  #   * lint-tokens-only / lint-no-admin-chat / lint-flat-route — house
  #     rules baked into web/scripts/.
  #   * openapi:check — regenerates web/src/api/generated/types.ts from
  #     contracts/openapi.yaml and diffs against the committed copy.
  #     Fails if the SPA's types have drifted from the backend contract.
  #     Without this gate, contract drift can ship silently because the
  #     SPA still type-checks against the stale generated file.
  #   * vitest — the SPA's unit suite.
  web:
    name: Web (lint + types + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint (tokens-only)
        working-directory: web
        run: npm run lint:tokens-only

      - name: Lint (no-admin-chat)
        working-directory: web
        run: npm run lint:no-admin-chat

      - name: Lint (flat-route)
        working-directory: web
        run: npm run lint:flat-route

      - name: OpenAPI types in sync with contract
        working-directory: web
        run: npm run openapi:check

      - name: Vitest
        working-directory: web
        run: npm test

  # Frontend (web-react/) job — the second SPA, same gates as web/ plus
  # tsc + vite build (the Lit SPA has no equivalent compile step; here
  # TS strict is part of the contract). Node 22: Vite 8 requires 22.12+.
  web-react:
    name: Web React (lint + types + tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web-react/package-lock.json

      - name: Install dependencies
        working-directory: web-react
        run: npm ci

      - name: Lint (tokens-only)
        working-directory: web-react
        run: npm run lint:tokens-only

      - name: Lint (no-admin-chat)
        working-directory: web-react
        run: npm run lint:no-admin-chat

      - name: Lint (flat-route)
        working-directory: web-react
        run: npm run lint:flat-route

      - name: OpenAPI types in sync with contract
        working-directory: web-react
        run: npm run openapi:check

      - name: Vitest
        working-directory: web-react
        run: npm test

      - name: Typecheck + build
        working-directory: web-react
        run: npm run build
