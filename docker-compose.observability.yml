# Self-hosted Langfuse for the observability spike.
#
# Boot alongside the dev Postgres + NATS (see docker-compose.dev.yml):
#
#   docker compose -f docker-compose.dev.yml \
#                  -f docker-compose.observability.yml up -d
#
# Then point the orchestrator + agent containers at the OTLP intake by
# exporting in your shell or .env:
#
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:3000/api/public/otel/v1/traces
#   OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic <base64(pk:sk)>"
#
# (Create the public/secret key pair in the Langfuse UI after first
# login; ``LANGFUSE_INIT_USER_*`` below seeds the first admin.)
#
# Stack consists of three Langfuse services and their datastores. The
# Langfuse `web` container serves the UI on http://localhost:3000;
# `worker` ingests OTLP and writes to Clickhouse; the rest are bog-
# standard datastores. Resource defaults are conservative — fine for
# a single-developer dev box, scale up for shared environments.
#
# Why three datastores: Clickhouse stores spans (analytics scans);
# Postgres stores metadata (users, projects, dashboards); Redis is
# the work queue + session cache. Langfuse expects all three.
#
# Networks: Langfuse datastores live on the compose-default network.
# ``langfuse-web`` ALSO joins ``rolemesh-agent-net`` so agents on the
# Internal=true bridge can reach it directly without a forward proxy
# allowlist entry. The orchestrator host process reaches it via the
# published ``localhost:3000`` port.
#
# DEV-ONLY shortcut: pinning Langfuse onto agent-net works for a
# single-developer box where every agent is allowed to see every
# observability hop. For a real multi-tenant deployment, agents must
# NOT reach Langfuse directly (a malicious agent could exfiltrate
# arbitrary data into traces). The production design is a NATS->OTLP
# bridge: agents publish spans to a NATS subject, the orchestrator
# subscribes and forwards to Langfuse with sanitisation. That bridge
# is a follow-up to the spike — see docs/observability/spike.md.
#
# The ``rolemesh-agent-net`` network is declared at the bottom of this
# file so ``docker compose up`` can create it before the orchestrator
# starts. The orchestrator's ``ensure_agent_network`` will detect the
# existing network and reuse it (Internal=true + ICC=true match its
# expected invariants).

services:

  langfuse-web:
    image: langfuse/langfuse:3
    # Explicit container_name keeps the prefix as ``langfuse-`` rather
    # than letting compose prepend the project directory name. The
    # orchestrator's startup ``cleanup_orphans("rolemesh-")`` would
    # otherwise match on ``rolemesh-2-langfuse-web-1`` and force-remove
    # Langfuse on every orchestrator restart.
    container_name: langfuse-web
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
      langfuse-minio:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - default
      - rolemesh-agent-net
    # Next.js v16 binds to a single interface IP unless HOSTNAME forces
    # 0.0.0.0. With both ``default`` and ``rolemesh-agent-net``
    # attached, it picks one and the other side's containers get
    # ECONNREFUSED — agents on agent-net can't reach Langfuse without
    # this override.
    hostname: langfuse-web
    environment:
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      # Single-tenant dev secret. Replace before sharing the deployment.
      NEXTAUTH_SECRET: dev-only-replace-me
      SALT: dev-only-replace-me
      # 256-bit hex key — Langfuse v3 enforces real entropy (rejects
      # all-zero placeholder). Regenerate with ``openssl rand -hex 32``
      # if you fork this compose into a shared deployment; the value
      # below is dev-only and committed for one-shot bootstrap.
      ENCRYPTION_KEY: 09fd60bf28ac4a1db428f5257723a5cf7947477555f1fa75901799ed0d822966
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_DEFAULT_PROJECT_ROLE: ADMIN
      # Bootstrap a first admin so the spike can finish in one shot.
      LANGFUSE_INIT_ORG_ID: rolemesh-dev
      LANGFUSE_INIT_ORG_NAME: RoleMesh Dev
      LANGFUSE_INIT_PROJECT_ID: rolemesh-spike
      LANGFUSE_INIT_PROJECT_NAME: RoleMesh Spike
      LANGFUSE_INIT_USER_EMAIL: dev@rolemesh.local
      LANGFUSE_INIT_USER_NAME: Dev
      LANGFUSE_INIT_USER_PASSWORD: rolemesh-dev

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      SALT: dev-only-replace-me
      # 256-bit hex key — Langfuse v3 enforces real entropy (rejects
      # all-zero placeholder). Regenerate with ``openssl rand -hex 32``
      # if you fork this compose into a shared deployment; the value
      # below is dev-only and committed for one-shot bootstrap.
      ENCRYPTION_KEY: 09fd60bf28ac4a1db428f5257723a5cf7947477555f1fa75901799ed0d822966

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: default
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=clickhouse --password=clickhouse --query='SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - langfuse-redis-data:/data

  langfuse-minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - langfuse-minio-data:/data

  # One-shot init: create the ``langfuse`` bucket the OTel ingestion
  # path writes spans into. Without this bucket, the OTLP intake
  # accepts the request but returns HTTP 500 ("specified bucket does
  # not exist") and every span gets dropped silently from the
  # exporter's retry buffer. Run-once: ``mc mb -p`` is idempotent so
  # restarts are no-ops once the bucket exists.
  langfuse-minio-init:
    image: minio/mc:latest
    container_name: langfuse-minio-init
    depends_on:
      langfuse-minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://langfuse-minio:9000 minio miniosecret >/dev/null 2>&1; do sleep 1; done
        mc mb -p local/langfuse
        echo "bucket ready"
    restart: "no"

volumes:
  langfuse-postgres-data:
  langfuse-clickhouse-data:
  langfuse-redis-data:
  langfuse-minio-data:

networks:
  # Reuse the bridge the orchestrator's ``ensure_agent_network``
  # creates (Internal=true + ICC=true). Declared external so compose
  # never tries to manage it — if compose owns creation, restarting
  # compose between agent runs would briefly disconnect every running
  # agent container. The bridge MUST exist before this compose comes
  # up; cold-bootstrap with:
  #   docker network create rolemesh-agent-net --internal \
  #     -o "com.docker.network.bridge.enable_icc=true"
  # or just start the orchestrator once first.
  rolemesh-agent-net:
    external: true
    name: rolemesh-agent-net
